services:
  ponti-db:
    image: pgvector/pgvector:pg16
    ports:
      - "${DB_PORT}:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ponti-db_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d postgres -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  ponti-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      ponti-db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      - HTTP_SERVER_HOST=0.0.0.0
      - DB_HOST=ponti-db
      - DB_PORT=5432
      - GO_MODULES_TOKEN=${GO_MODULES_TOKEN:-}
    volumes:
      - .:/app
      - go-modules:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    networks:
      - app-network
    restart: unless-stopped


networks:
  app-network:
    driver: bridge


volumes:
  ponti-db_data:
  pgadmin_data:
  go-modules:
  go-build-cache:

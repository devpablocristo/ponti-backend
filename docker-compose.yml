services:
 ponti-db:
   image: pgvector/pgvector:pg16
   ports:
     - "5433:5432"
   env_file:
     - .env
   environment:
     - POSTGRES_USER=${DB_USER}
     - POSTGRES_PASSWORD=${DB_PASSWORD}
     - POSTGRES_DB=${DB_NAME}
   volumes:
     - ponti-db_data:/var/lib/postgresql/data
   networks:
     - app-network
   healthcheck:
     test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} -p 5432"]
     interval: 5s
     timeout: 5s
     retries: 5


 migrate:
   image: migrate/migrate:v4.17.1
   depends_on:
     ponti-db:
       condition: service_healthy
   env_file:
     - .env
   volumes:
     - ./migrations_v4:/migrations
     - ./scripts/db:/scripts/db:ro
   entrypoint: ["/bin/sh", "/scripts/db/compose_migrate.sh"]
   networks:
     - app-network


 ponti-api:
   build:
     context: .
     dockerfile: Dockerfile
   container_name: ponti-backend-api
   env_file:
     - .env
   ports:
     - "8080:8080"
   depends_on:
     ponti-db:
       condition: service_healthy
   networks:
     - app-network
   restart: unless-stopped


networks:
 app-network:
   driver: bridge


volumes:
 ponti-db_data:
services:
  ponti-db:
    image: pgvector/pgvector:pg16
    ports:
      - "${DB_PORT}:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ponti-db_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-new_ponti_db_dev} -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      ponti-db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./migrations_v4:/migrations
      - ./scripts/db:/scripts/db:ro
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_SSL_MODE=${DB_SSL_MODE}
    entrypoint: ["/bin/sh", "/scripts/db/compose_migrate.sh"]
    networks:
      - app-network


networks:
  app-network:
    driver: bridge


volumes:
  ponti-db_data:
  pgadmin_data:
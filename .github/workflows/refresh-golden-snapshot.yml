name: Refresh Golden Snapshot (STG → DEV bucket)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read
  id-token: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    environment:
      name: dev
    env:
      # El snapshot se exporta desde la DB de STAGING, pero la instancia vive en DEV (unificada).
      # Usamos credenciales/permiso de DEV para poder exportar/importar sin fricción.
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID_DEV }}
      # Proyecto donde vive la instancia (unificada en dev)
      CLOUDSQL_PROJECT_STG: ${{ vars.CLOUDSQL_PROJECT_STG }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      WIF_PROVIDER: ${{ vars.WIF_PROVIDER_DEV }}
      WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT_DEV }}
      SANITIZED_OK: ${{ vars.SANITIZED_OK }}
      # Opcional: si se define, se enforcea el proyecto esperado.
      EXPECTED_INSTANCE_PROJECT: ${{ vars.EXPECTED_INSTANCE_PROJECT }}
      DB_INSTANCE_NAME_STG: ${{ vars.DB_INSTANCE_NAME_STG }}
      DB_NAME_STG: ${{ vars.DB_NAME_STG }}
      # Guardamos el snapshot en el bucket de DEV (mismo bucket que previews) para evitar permisos cross-project.
      GOLDEN_SNAPSHOT_BUCKET: ${{ vars.PREVIEW_BUCKET }}
    steps:
      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Validar config mínima
        run: |
          if [ -z "$DB_INSTANCE_NAME_STG" ]; then
            echo "::error::Falta DB_INSTANCE_NAME_STG"
            exit 1
          fi
          if [ -z "$DB_NAME_STG" ]; then
            echo "::error::Falta DB_NAME_STG"
            exit 1
          fi
          if [ -z "$GOLDEN_SNAPSHOT_BUCKET" ]; then
            echo "::error::Falta GOLDEN_SNAPSHOT_BUCKET"
            exit 1
          fi
          # Proyecto donde vive la instancia (definido por vars del repo / environment)
          INSTANCE_PROJECT="${CLOUDSQL_PROJECT_STG:-$GCP_PROJECT_ID}"
          echo "INSTANCE_PROJECT=$INSTANCE_PROJECT" >> "$GITHUB_ENV"

      - name: Gate sanitization
        run: |
          set -euo pipefail
          if [ "${SANITIZED_OK:-}" != "true" ]; then
            echo "::error::SANITIZED_OK debe ser 'true' para exportar snapshot golden."
            exit 1
          fi

      - name: Guardrails (allowlist)
        run: |
          set -euo pipefail

          # Si EXPECTED_INSTANCE_PROJECT está definido, forzamos igualdad.
          if [[ -n "${EXPECTED_INSTANCE_PROJECT:-}" ]] && [[ "$INSTANCE_PROJECT" != "$EXPECTED_INSTANCE_PROJECT" ]]; then
            echo "::error::INSTANCE_PROJECT inesperado: '$INSTANCE_PROJECT' (esperado: '$EXPECTED_INSTANCE_PROJECT')"
            exit 1
          fi

          instance_lower="$(printf '%s' "$DB_INSTANCE_NAME_STG" | tr '[:upper:]' '[:lower:]')"
          if [[ "$instance_lower" == *prod* ]]; then
            echo "::error::DB_INSTANCE_NAME_STG contiene 'prod': '$DB_INSTANCE_NAME_STG'"
            exit 1
          fi
          if [[ ! "$instance_lower" =~ -stg$ ]]; then
            echo "::error::DB_INSTANCE_NAME_STG debe terminar en '-stg': '$DB_INSTANCE_NAME_STG'"
            exit 1
          fi

          db_lower="$(printf '%s' "$DB_NAME_STG" | tr '[:upper:]' '[:lower:]')"
          if [[ "$db_lower" == *prod* ]]; then
            echo "::error::DB_NAME_STG no puede contener 'prod': '$DB_NAME_STG'"
            exit 1
          fi
          if [[ ! "$db_lower" =~ (_stg|-stg)$ ]]; then
            echo "::error::DB_NAME_STG debe terminar en '_stg' o '-stg': '$DB_NAME_STG'"
            exit 1
          fi
          if [ -z "$GOLDEN_SNAPSHOT_BUCKET" ]; then
            echo "::error::Falta GOLDEN_SNAPSHOT_BUCKET"
            exit 1
          fi

      - name: Exportar Golden Snapshot
        run: |
          TS=$(date +"%Y%m%d_%H%M%S")
          SNAPSHOT_URI="gs://${GOLDEN_SNAPSHOT_BUCKET}/golden/golden_${DB_NAME_STG}_${TS}.sql.gz"
          LATEST_URI="gs://${GOLDEN_SNAPSHOT_BUCKET}/golden/latest.sql.gz"

          # Usar proyecto donde vive la instancia (definido por vars del repo / environment)
          gcloud sql export sql "$DB_INSTANCE_NAME_STG" "$SNAPSHOT_URI" \
            --project="${INSTANCE_PROJECT}" \
            --database="$DB_NAME_STG" \
            --offload \
            --quiet

          gcloud storage cp "$SNAPSHOT_URI" "$LATEST_URI"

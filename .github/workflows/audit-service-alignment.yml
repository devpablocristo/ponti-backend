name: Audit Service Alignment

on:
  schedule:
    # Weekly on Mondays at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

concurrency:
  group: ponti-backend-audit-service-alignment
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  audit:
    name: Audit ${{ matrix.env_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env_name: dev
            project_id: ${{ vars.GCP_PROJECT_ID_DEV }}
            region: us-central1
            wif_provider: ${{ vars.WIF_PROVIDER_DEV }}
            wif_service_account: ${{ vars.WIF_SERVICE_ACCOUNT_DEV }}
          - env_name: staging
            project_id: ${{ vars.GCP_PROJECT_ID_STG }}
            region: us-central1
            wif_provider: ${{ vars.WIF_PROVIDER_STG }}
            wif_service_account: ${{ vars.WIF_SERVICE_ACCOUNT_STG }}
          - env_name: prod
            project_id: ${{ vars.GCP_PROJECT_ID_PROD }}
            region: ${{ vars.GCP_REGION || 'europe-west1' }}
            wif_provider: ${{ vars.WIF_PROVIDER_PROD }}
            wif_service_account: ${{ vars.WIF_SERVICE_ACCOUNT_PROD }}

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ matrix.wif_provider }}
          service_account: ${{ matrix.wif_service_account }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ matrix.project_id }}

      - name: Audit Cloud Run service alignment
        run: |
          python3 - <<'PY'
          import json
          import subprocess
          import sys

          ENV_NAME = "${{ matrix.env_name }}"
          PROJECT_ID = "${{ matrix.project_id }}"
          REGION = "${{ matrix.region }}"
          SERVICES = ["ponti-frontend", "ponti-backend", "ponti-ai"]

          def describe(service: str):
              cmd = [
                  "gcloud", "run", "services", "describe", service,
                  "--project", PROJECT_ID,
                  "--platform", "managed",
                  "--region", REGION,
                  "--format", "json",
              ]
              proc = subprocess.run(cmd, capture_output=True, text=True)
              if proc.returncode != 0:
                  raise RuntimeError(proc.stderr.strip() or f"describe failed for {service}")
              return json.loads(proc.stdout)

          def env_map(service_json: dict):
              envs = (
                  service_json.get("spec", {})
                  .get("template", {})
                  .get("spec", {})
                  .get("containers", [{}])[0]
                  .get("env", [])
              )
              return {e.get("name"): e.get("value", "") for e in envs if "value" in e}

          errors = []
          rows = []
          svc_data = {}

          for svc in SERVICES:
              try:
                  data = describe(svc)
                  svc_data[svc] = data
              except Exception as exc:
                  errors.append(f"[{ENV_NAME}] {svc}: {exc}")
                  continue

          backend_url = ""
          if "ponti-backend" in svc_data:
              backend_url = svc_data["ponti-backend"].get("status", {}).get("url", "").rstrip("/")

          for svc, data in svc_data.items():
              traffic = data.get("status", {}).get("traffic", [])
              latest_100 = any(t.get("latestRevision") is True and int(t.get("percent", 0)) == 100 for t in traffic)
              if not latest_100:
                  errors.append(f"[{ENV_NAME}] {svc}: traffic not 100% on latestRevision")

              vars_map = env_map(data)

              # Generic guardrail: no tagged URL in internal URL-like vars.
              for name, value in vars_map.items():
                  if not value:
                      continue
                  if name.endswith("_URL") or name in {"BASE_MANAGER_API", "AI_SERVICE_URL"}:
                      if "---" in value:
                          errors.append(f"[{ENV_NAME}] {svc}: {name} points to tagged URL ({value})")

              if svc == "ponti-frontend":
                  base_manager_api = vars_map.get("BASE_MANAGER_API", "").rstrip("/")
                  if not base_manager_api:
                      errors.append(f"[{ENV_NAME}] ponti-frontend: BASE_MANAGER_API is empty")
                  elif backend_url:
                      expected = f"{backend_url}/api/v1"
                      if base_manager_api != expected:
                          errors.append(
                              f"[{ENV_NAME}] ponti-frontend: BASE_MANAGER_API mismatch. "
                              f"expected={expected} actual={base_manager_api}"
                          )

              rows.append({
                  "service": svc,
                  "latest100": latest_100,
                  "url": data.get("status", {}).get("url", ""),
              })

          print(f"Audit environment: {ENV_NAME}")
          for row in rows:
              print(f"- {row['service']}: latest100={row['latest100']} url={row['url']}")

          if errors:
              print("\\nAlignment errors detected:")
              for err in errors:
                  print(f"  - {err}")
              sys.exit(1)

          print("\\nAlignment OK.")
          PY


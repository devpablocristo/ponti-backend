name: Deploy PROD (promote STAGING artifact)

on:
  workflow_dispatch:
    inputs:
      staging_sha:
        description: "SHA a promover desde STAGING (imagen tag = sha)"
        required: true
      reason:
        description: "Motivo / ticket (texto libre)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  promote-and-deploy:
    runs-on: ubuntu-latest
    env:
      GCP_REGION: ${{ vars.GCP_REGION }}
      ARTIFACT_REGISTRY: ${{ vars.ARTIFACT_REGISTRY }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}

      # STAGING (source image)
      GCP_PROJECT_ID_STG: ${{ vars.GCP_PROJECT_ID_STG }}
      WIF_PROVIDER_STG: ${{ vars.WIF_PROVIDER_STG }}
      WIF_SERVICE_ACCOUNT_STG: ${{ vars.WIF_SERVICE_ACCOUNT_STG }}

      # PROD (target deploy)
      GCP_PROJECT_ID_PROD: ${{ vars.GCP_PROJECT_ID_PROD }}
      SERVICE_NAME_PROD: ${{ vars.SERVICE_NAME_PROD }}
      CLOUD_RUN_SERVICE_ACCOUNT_PROD: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT_PROD }}
      WIF_PROVIDER_PROD: ${{ vars.WIF_PROVIDER_PROD }}
      WIF_SERVICE_ACCOUNT_PROD: ${{ vars.WIF_SERVICE_ACCOUNT_PROD }}
      SECRET_DB_PASSWORD_NAME_PROD: db-password-prod
      SECRET_X_API_KEY_NAME_PROD: x-api-key-prod
      CLOUDSQL_INSTANCE: ${{ vars.CLOUDSQL_INSTANCE_PROD }}
      DB_NAME: ${{ vars.DB_NAME_PROD }}
      DB_USER: ${{ vars.DB_USER_PROD }}

      API_VERSION: ${{ vars.API_VERSION }}
      HTTP_SERVER_NAME: ${{ vars.HTTP_SERVER_NAME }}
      HTTP_SERVER_HOST: ${{ vars.HTTP_SERVER_HOST }}
      DB_TYPE: ${{ vars.DB_TYPE }}
      DB_SSL_MODE: ${{ vars.DB_SSL_MODE }}
      DB_PORT: ${{ vars.DB_PORT }}
      MIGRATIONS_DIR: ${{ vars.MIGRATIONS_DIR }}
      WORDS_SUGGESTER_LIMIT: ${{ vars.WORDS_SUGGESTER_LIMIT }}
      WORDS_SUGGESTER_THRESHOLD: ${{ vars.WORDS_SUGGESTER_THRESHOLD }}
      REPORT_SCHEMA: ${{ vars.REPORT_SCHEMA }}
      SERVICE_ENV_NAME: ${{ vars.SERVICE_NAME_ENV }}
      SERVICE_ENV_VERSION: ${{ vars.SERVICE_VERSION_ENV }}
      SERVICE_ENV_MAX_RETRIES: ${{ vars.SERVICE_MAX_RETRIES_ENV }}

    steps:
      - name: Checkout (solo para metadata)
        uses: actions/checkout@v4

      - name: Auth GCP (STAGING - pull Artifact)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER_STG }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT_STG }}

      - name: Setup gcloud (STAGING)
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID_STG }}

      - name: Configure Docker auth (STAGING)
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Pull imagen de STAGING
        env:
          STAGING_SHA: ${{ github.event.inputs.staging_sha }}
        run: |
          src_image="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID_STG}/${ARTIFACT_REGISTRY}/${IMAGE_NAME}:${STAGING_SHA}"
          echo "SRC_IMAGE=$src_image" >> "$GITHUB_ENV"
          docker pull "$src_image"

      - name: Auth GCP (PROD - push + deploy)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER_PROD }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT_PROD }}

      - name: Setup gcloud (PROD)
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID_PROD }}

      - name: Configure Docker auth (PROD)
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Push imagen a PROD (retag)
        env:
          STAGING_SHA: ${{ github.event.inputs.staging_sha }}
        run: |
          dst_sha="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID_PROD}/${ARTIFACT_REGISTRY}/${IMAGE_NAME}:${STAGING_SHA}"
          dst_prod="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID_PROD}/${ARTIFACT_REGISTRY}/${IMAGE_NAME}:prod"
          docker tag "$SRC_IMAGE" "$dst_sha"
          docker tag "$SRC_IMAGE" "$dst_prod"
          docker push "$dst_sha"
          docker push "$dst_prod"
          echo "IMAGE_URI=$dst_sha" >> "$GITHUB_ENV"

      - name: Deploy a Cloud Run (PROD)
        run: |
          DB_HOST="/cloudsql/${CLOUDSQL_INSTANCE}"
          ENV_VARS="GO_ENVIRONMENT=cloudrun,DEPLOY_ENV=prod,DEPLOY_PLATFORM=gcp,SERVICE_NAME=${SERVICE_ENV_NAME},SERVICE_VERSION=${SERVICE_ENV_VERSION},SERVICE_MAX_RETRIES=${SERVICE_ENV_MAX_RETRIES},API_VERSION=${API_VERSION},HTTP_SERVER_NAME=${HTTP_SERVER_NAME},HTTP_SERVER_HOST=${HTTP_SERVER_HOST},DB_TYPE=${DB_TYPE},DB_USER=${DB_USER},DB_HOST=${DB_HOST},DB_NAME=${DB_NAME},DB_SSL_MODE=${DB_SSL_MODE},DB_PORT=${DB_PORT},MIGRATIONS_DIR=${MIGRATIONS_DIR},WORDS_SUGGESTER_LIMIT=${WORDS_SUGGESTER_LIMIT},WORDS_SUGGESTER_THRESHOLD=${WORDS_SUGGESTER_THRESHOLD},REPORT_SCHEMA=${REPORT_SCHEMA},IDENTITY_PROJECT_ID=${GCP_PROJECT_ID_PROD}"
          gcloud run deploy "$SERVICE_NAME_PROD" \
            --project="$GCP_PROJECT_ID_PROD" \
            --region="$GCP_REGION" \
            --image="$IMAGE_URI" \
            --service-account="$CLOUD_RUN_SERVICE_ACCOUNT_PROD" \
            --add-cloudsql-instances="$CLOUDSQL_INSTANCE" \
            --set-env-vars="${ENV_VARS}" \
            --set-secrets="DB_PASSWORD=${SECRET_DB_PASSWORD_NAME_PROD}:latest,X_API_KEY=${SECRET_X_API_KEY_NAME_PROD}:latest" \
            --allow-unauthenticated


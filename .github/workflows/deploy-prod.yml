name: Deploy PROD (promote STAGING artifact)

on:
  workflow_dispatch:
    inputs:
      staging_sha:
        description: "SHA a promover desde STAGING (imagen tag = sha)"
        required: true
      reason:
        description: "Motivo / ticket (texto libre)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  promote-and-deploy:
    runs-on: ubuntu-latest
    env:
      GCP_REGION: ${{ vars.GCP_REGION_PROD }}
      ARTIFACT_REGISTRY: ${{ vars.ARTIFACT_REGISTRY }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}

      # STAGING (source image)
      GCP_PROJECT_ID_STG: ${{ vars.GCP_PROJECT_ID_STG }}
      WIF_PROVIDER_STG: ${{ vars.WIF_PROVIDER_STG }}
      WIF_SERVICE_ACCOUNT_STG: ${{ vars.WIF_SERVICE_ACCOUNT_STG }}

      # PROD (target deploy)
      GCP_PROJECT_ID_PROD: ${{ vars.GCP_PROJECT_ID_PROD }}
      SERVICE_NAME_PROD: ${{ vars.SERVICE_NAME_PROD }}
      CLOUD_RUN_SERVICE_ACCOUNT_PROD: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT_PROD }}
      WIF_PROVIDER_PROD: ${{ vars.WIF_PROVIDER_PROD }}
      WIF_SERVICE_ACCOUNT_PROD: ${{ vars.WIF_SERVICE_ACCOUNT_PROD }}
      SECRET_DB_PASSWORD_NAME_PROD: db-password-prod
      SECRET_X_API_KEY_NAME_PROD: x-api-key-prod
      CLOUDSQL_PROXY_PORT: "55432"
      REQUIRE_AUTH_SMOKE: "0"
      CLOUDSQL_INSTANCE: ${{ vars.CLOUDSQL_INSTANCE_PROD }}
      DB_NAME: ${{ vars.DB_NAME_PROD }}
      DB_USER: ${{ vars.DB_USER_PROD }}

      API_VERSION: ${{ vars.API_VERSION }}
      HTTP_SERVER_NAME: ${{ vars.HTTP_SERVER_NAME }}
      HTTP_SERVER_HOST: ${{ vars.HTTP_SERVER_HOST }}
      DB_TYPE: ${{ vars.DB_TYPE }}
      DB_SSL_MODE: ${{ vars.DB_SSL_MODE }}
      DB_PORT: ${{ vars.DB_PORT }}
      MIGRATIONS_DIR: ${{ vars.MIGRATIONS_DIR }}
      WORDS_SUGGESTER_LIMIT: ${{ vars.WORDS_SUGGESTER_LIMIT }}
      WORDS_SUGGESTER_THRESHOLD: ${{ vars.WORDS_SUGGESTER_THRESHOLD }}
      REPORT_SCHEMA: ${{ vars.REPORT_SCHEMA }}
      SERVICE_ENV_NAME: ${{ vars.SERVICE_NAME_ENV }}
      SERVICE_ENV_VERSION: ${{ vars.SERVICE_VERSION_ENV }}
      SERVICE_ENV_MAX_RETRIES: ${{ vars.SERVICE_MAX_RETRIES_ENV }}

    steps:
      - name: Checkout (solo para metadata)
        uses: actions/checkout@v4

      - name: Auth GCP (STAGING - pull Artifact)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER_STG }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT_STG }}

      - name: Setup gcloud (STAGING)
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID_STG }}

      - name: Configure Docker auth (STAGING)
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Pull imagen de STAGING
        env:
          STAGING_SHA: ${{ github.event.inputs.staging_sha }}
        run: |
          src_image="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID_STG}/${ARTIFACT_REGISTRY}/${IMAGE_NAME}:${STAGING_SHA}"
          echo "SRC_IMAGE=$src_image" >> "$GITHUB_ENV"
          docker pull "$src_image"

      - name: Auth GCP (PROD - push + deploy)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER_PROD }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT_PROD }}

      - name: Setup gcloud (PROD)
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID_PROD }}

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Configure Docker auth (PROD)
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Push imagen a PROD (retag)
        env:
          STAGING_SHA: ${{ github.event.inputs.staging_sha }}
        run: |
          dst_sha="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID_PROD}/${ARTIFACT_REGISTRY}/${IMAGE_NAME}:${STAGING_SHA}"
          dst_prod="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID_PROD}/${ARTIFACT_REGISTRY}/${IMAGE_NAME}:prod"
          docker tag "$SRC_IMAGE" "$dst_sha"
          docker tag "$SRC_IMAGE" "$dst_prod"
          docker push "$dst_sha"
          docker push "$dst_prod"
          echo "IMAGE_URI=$dst_sha" >> "$GITHUB_ENV"

      - name: Deploy a Cloud Run (PROD)
        run: |
          DB_HOST="/cloudsql/${CLOUDSQL_INSTANCE}"
          ENV_VARS="GO_ENVIRONMENT=cloudrun,DEPLOY_ENV=prod,DEPLOY_PLATFORM=gcp,SERVICE_NAME=${SERVICE_ENV_NAME},SERVICE_VERSION=${SERVICE_ENV_VERSION},SERVICE_MAX_RETRIES=${SERVICE_ENV_MAX_RETRIES},API_VERSION=${API_VERSION},HTTP_SERVER_NAME=${HTTP_SERVER_NAME},HTTP_SERVER_HOST=${HTTP_SERVER_HOST},DB_TYPE=${DB_TYPE},DB_USER=${DB_USER},DB_HOST=${DB_HOST},DB_NAME=${DB_NAME},DB_SSL_MODE=${DB_SSL_MODE},DB_PORT=${DB_PORT},MIGRATIONS_DIR=${MIGRATIONS_DIR},WORDS_SUGGESTER_LIMIT=${WORDS_SUGGESTER_LIMIT},WORDS_SUGGESTER_THRESHOLD=${WORDS_SUGGESTER_THRESHOLD},REPORT_SCHEMA=${REPORT_SCHEMA},IDENTITY_PROJECT_ID=${GCP_PROJECT_ID_PROD}"
          gcloud run deploy "$SERVICE_NAME_PROD" \
            --project="$GCP_PROJECT_ID_PROD" \
            --region="$GCP_REGION" \
            --image="$IMAGE_URI" \
            --service-account="$CLOUD_RUN_SERVICE_ACCOUNT_PROD" \
            --add-cloudsql-instances="$CLOUDSQL_INSTANCE" \
            --set-env-vars="${ENV_VARS}" \
            --set-secrets="DB_PASSWORD=${SECRET_DB_PASSWORD_NAME_PROD}:latest,X_API_KEY=${SECRET_X_API_KEY_NAME_PROD}:latest" \
            --allow-unauthenticated

      - name: Resolve service URL (PROD)
        run: |
          service_url="$(gcloud run services describe "$SERVICE_NAME_PROD" \
            --project="$GCP_PROJECT_ID_PROD" \
            --region="$GCP_REGION" \
            --format='value(status.url)')"
          if [[ -z "$service_url" ]]; then
            echo "ERROR: no se pudo resolver status.url del servicio PROD."
            exit 1
          fi
          echo "SERVICE_URL=$service_url" >> "$GITHUB_ENV"

      - name: "Guardrail: traffic/latest + detagged service URLs (PROD)"
        run: |
          service_json="$(gcloud run services describe "$SERVICE_NAME_PROD" \
            --project="$GCP_PROJECT_ID_PROD" \
            --region="$GCP_REGION" \
            --format='json')"
          SERVICE_JSON="$service_json" python3 - <<'PY'
          import json, os, sys
          svc = json.loads(os.environ["SERVICE_JSON"])
          traffic = svc.get("status", {}).get("traffic", [])
          ok_latest = any(t.get("latestRevision") is True and int(t.get("percent", 0)) == 100 for t in traffic)
          if not ok_latest:
              print("ERROR: guardrail falló: tráfico no está 100% en latestRevision.")
              sys.exit(1)
          envs = svc.get("spec", {}).get("template", {}).get("spec", {}).get("containers", [{}])[0].get("env", [])
          bad = []
          watched = {"BASE_MANAGER_API", "AI_SERVICE_URL"}
          for e in envs:
              name = e.get("name", "")
              value = e.get("value", "")
              if not value:
                  continue
              if name in watched or name.endswith("_URL"):
                  if "---" in value:
                      bad.append(f"{name}={value}")
          if bad:
              print("ERROR: guardrail falló: URLs internas taggeadas detectadas:")
              for item in bad:
                  print(f" - {item}")
              sys.exit(1)
          print("Guardrail OK: latestRevision=100% y sin URLs taggeadas.")
          PY

      - name: Resolve DB password for schema checks (PROD)
        run: |
          db_password="${SMOKE_DB_PASSWORD:-}"
          if [[ -z "$db_password" ]]; then
            db_password="$(gcloud secrets versions access latest \
              --project="$GCP_PROJECT_ID_PROD" \
              --secret="$SECRET_DB_PASSWORD_NAME_PROD" 2>/dev/null || true)"
          fi
          if [[ -z "$db_password" ]]; then
            echo "ERROR: no se pudo resolver DB password para schema checks en PROD."
            exit 1
          fi
          echo "::add-mask::$db_password"
          echo "SMOKE_DB_PASSWORD=$db_password" >> "$GITHUB_ENV"
        env:
          SMOKE_DB_PASSWORD: ${{ secrets.DB_PASSWORD_PROD }}

      - name: Start Cloud SQL Proxy for schema checks (PROD)
        run: |
          token="$(gcloud auth print-access-token)"
          docker rm -f cloudsql-proxy-deploy-prod >/dev/null 2>&1 || true
          instance_connection="$CLOUDSQL_INSTANCE"
          if [[ "$instance_connection" != *:*:* ]]; then
            instance_connection="${GCP_PROJECT_ID_PROD}:${GCP_REGION}:${CLOUDSQL_INSTANCE}"
          fi
          docker run -d --name cloudsql-proxy-deploy-prod \
            -p "127.0.0.1:${CLOUDSQL_PROXY_PORT}:5432" \
            gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0 \
            --address 0.0.0.0 \
            --port 5432 \
            --token "$token" \
            "$instance_connection" >/dev/null
          for i in {1..30}; do
            if PGPASSWORD="$SMOKE_DB_PASSWORD" pg_isready -h 127.0.0.1 -p "$CLOUDSQL_PROXY_PORT" -U "$DB_USER" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: cloud sql proxy no quedó listo en PROD"
          exit 1

      - name: Schema guardrails (PROD)
        run: |
          chmod +x scripts/check_schema_guardrails.sh
          DB_HOST=127.0.0.1 \
          DB_PORT="$CLOUDSQL_PROXY_PORT" \
          DB_USER="$DB_USER" \
          DB_NAME="$DB_NAME" \
          DB_PASSWORD="$SMOKE_DB_PASSWORD" \
          MIGRATIONS_DIR="migrations_v4" \
          scripts/check_schema_guardrails.sh

      - name: Resolve X-API-Key for smoke (PROD)
        run: |
          x_api_key="${SMOKE_X_API_KEY:-}"
          if [[ -z "$x_api_key" ]]; then
            x_api_key="$(gcloud secrets versions access latest \
              --project="$GCP_PROJECT_ID_PROD" \
              --secret="$SECRET_X_API_KEY_NAME_PROD" 2>/dev/null || true)"
          fi
          if [[ -z "$x_api_key" ]]; then
            echo "ERROR: no se pudo resolver X-API-Key (GitHub secret o Secret Manager) en PROD."
            exit 1
          fi
          echo "::add-mask::$x_api_key"
          echo "SMOKE_X_API_KEY=$x_api_key" >> "$GITHUB_ENV"
        env:
          SMOKE_X_API_KEY: ${{ secrets.X_API_KEY_PROD }}

      - name: Resolve auth token for functional smoke (PROD)
        run: |
          token="${SMOKE_AUTH_BEARER_TOKEN:-}"
          if [[ -z "$token" ]]; then
            echo "WARN: SMOKE_AUTH_BEARER_TOKEN no configurado; se ejecutará smoke no autenticado."
          else
            echo "::add-mask::$token"
            echo "AUTH_BEARER_TOKEN=$token" >> "$GITHUB_ENV"
          fi
        env:
          SMOKE_AUTH_BEARER_TOKEN: ${{ secrets.SMOKE_AUTH_BEARER_TOKEN_PROD }}

      - name: Smoke release checks (PROD)
        run: |
          bash ./scripts/smoke_release.sh "$SERVICE_URL"
        env:
          X_API_KEY: ${{ env.SMOKE_X_API_KEY }}
          AUTH_BEARER_TOKEN: ${{ env.AUTH_BEARER_TOKEN }}
          REQUIRE_AUTH_SMOKE: ${{ env.REQUIRE_AUTH_SMOKE }}

      - name: Stop Cloud SQL Proxy (PROD)
        if: ${{ always() }}
        run: docker rm -f cloudsql-proxy-deploy-prod >/dev/null 2>&1 || true

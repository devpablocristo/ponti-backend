name: Cleanup Preview Resources

on:
  pull_request:
    types: [closed]
  schedule:
    # TTL check cada 6 horas
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_PROJECT_ID_DEV: ${{ vars.GCP_PROJECT_ID_DEV }}
      WIF_PROVIDER_DEV: ${{ vars.WIF_PROVIDER_DEV }}
      WIF_SERVICE_ACCOUNT_DEV: ${{ vars.WIF_SERVICE_ACCOUNT_DEV }}
      DB_INSTANCE_NAME_DEV: ${{ vars.DB_INSTANCE_NAME_DEV }}
      PREVIEW_DB_PREFIX: "db_pr_"
      PREVIEW_SERVICE_PREFIX: ${{ vars.PREVIEW_SERVICE_PREFIX }}
      PREVIEW_BUCKET: ${{ vars.PREVIEW_BUCKET }}
    steps:
      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER_DEV }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT_DEV }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID_DEV }}

      - name: Validar config mínima
        run: |
          if [ -z "$DB_INSTANCE_NAME_DEV" ]; then
            echo "::error::Falta DB_INSTANCE_NAME_DEV"
            exit 1
          fi
          if [ -z "$PREVIEW_SERVICE_PREFIX" ]; then
            echo "::error::Falta PREVIEW_SERVICE_PREFIX"
            exit 1
          fi

      - name: Cleanup por cierre de PR
        if: ${{ github.event_name == 'pull_request' }}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          DB_NAME="${PREVIEW_DB_PREFIX}${PR_NUMBER}"
          SERVICE_NAME="${PREVIEW_SERVICE_PREFIX}${PR_NUMBER}"

          echo "::notice::Eliminando DB preview ${DB_NAME}"
          gcloud sql databases delete "$DB_NAME" \
            --project="$GCP_PROJECT_ID_DEV" \
            --instance="$DB_INSTANCE_NAME_DEV" \
            --quiet || true

          echo "::notice::Eliminando servicio preview ${SERVICE_NAME}"
          gcloud run services delete "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID_DEV" \
            --region="$GCP_REGION" \
            --quiet || true

          if [ -n "$PREVIEW_BUCKET" ]; then
            PREFIX="gs://${PREVIEW_BUCKET}/preview-seeds/${DB_NAME}_"
            echo "::notice::Eliminando snapshots con prefijo ${PREFIX}"
            gcloud storage ls "gs://${PREVIEW_BUCKET}/preview-seeds/" --format=gsutil | \
              python -c 'import sys; prefix=sys.argv[1]; [print(line.strip()) for line in sys.stdin if line.strip().startswith(prefix)]' "$PREFIX" | \
              xargs -r gcloud storage rm --quiet
          fi

      - name: Cleanup TTL (cada 6h - elimina previews > 48h)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        env:
          TTL_HOURS: 48
        run: |
          echo "::notice::Limpiando previews con TTL > ${TTL_HOURS}h"
          CUTOFF=$(date -u -d "${TTL_HOURS} hours ago" +%Y-%m-%dT%H:%M:%SZ)

          # Listar servicios preview expirados (JSON + jq para parsing robusto)
          echo "::notice::Buscando servicios preview expirados..."
          gcloud run services list \
            --project="$GCP_PROJECT_ID_DEV" \
            --region="$GCP_REGION" \
            --format=json | \
          jq -r --arg prefix "$PREVIEW_SERVICE_PREFIX" --arg cutoff "$CUTOFF" '
            .[] | select(.metadata.name | startswith($prefix)) |
            select(.metadata.creationTimestamp < $cutoff) |
            .metadata.name
          ' | while read -r name; do
            [ -z "$name" ] && continue
            echo "::notice::Eliminando servicio expirado: $name"
            gcloud run services delete "$name" \
              --project="$GCP_PROJECT_ID_DEV" \
              --region="$GCP_REGION" \
              --quiet || true

            # Extraer PR number (solo el número, p.ej. ponti-backend-preview-42 -> 42)
            PR_NUM="${name#${PREVIEW_SERVICE_PREFIX}}"
            PR_NUM="${PR_NUM%%-*}"
            DB_NAME="${PREVIEW_DB_PREFIX}${PR_NUM}"
            echo "::notice::Eliminando DB asociada: $DB_NAME"
            gcloud sql databases delete "$DB_NAME" \
              --project="$GCP_PROJECT_ID_DEV" \
              --instance="$DB_INSTANCE_NAME_DEV" \
              --quiet || true
          done

          # Limpiar snapshots huérfanos en bucket (solo si existen objetos)
          if [ -n "$PREVIEW_BUCKET" ]; then
            echo "::notice::Limpiando snapshots preview huérfanos..."
            gcloud storage ls "gs://${PREVIEW_BUCKET}/preview-seeds/" --uri 2>/dev/null | while read -r uri; do
              [ -z "$uri" ] && continue
              MOD_TIME=$(gcloud storage objects describe "$uri" --format='value(updated)' 2>/dev/null | tr -d '[:space:]')
              if [ -n "$MOD_TIME" ] && [[ "$MOD_TIME" < "$CUTOFF" ]]; then
                echo "::notice::Eliminando snapshot expirado: $uri"
                gcloud storage rm "$uri" --quiet || true
              fi
            done
          fi

          echo "::notice::Cleanup TTL completado"

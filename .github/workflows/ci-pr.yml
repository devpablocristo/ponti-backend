name: CI PR

on:
  pull_request:
    branches: [develop]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "migrations_v4/**"
      - "scripts/**"
      - "Dockerfile"
      - ".github/workflows/ci-pr.yml"

concurrency:
  group: ponti-backend-ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GOPRIVATE: github.com/devpablocristo/*
  CORE_GOVERNANCE_MODULE: github.com/devpablocristo/core/governance/go@v0.0.0-20260328151810-084828e80b26

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure private Go modules
        run: git config --global url."https://${{ secrets.CORE_REPO_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Download Go modules
        run: |
          go mod download "$CORE_GOVERNANCE_MODULE"
          go mod download

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure private Go modules
        run: git config --global url."https://${{ secrets.CORE_REPO_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Download Go modules
        run: |
          go mod download "$CORE_GOVERNANCE_MODULE"
          go mod download

      - name: Build
        run: go build ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure private Go modules
        run: git config --global url."https://${{ secrets.CORE_REPO_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Download Go modules
        run: |
          go mod download "$CORE_GOVERNANCE_MODULE"
          go mod download

      - name: Tests with coverage
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out | tail -1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

      - name: Coverage gate (warns, no fail por ahora)
        # Baseline tentativo (post-refactor sept 2026): media de módulos
        # con tests reales ≈ 30%. Subir el threshold cuando el equipo
        # acumule más tests; por ahora warning-only para no bloquear PRs.
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${total}%"
          threshold=25
          if awk "BEGIN { exit !(${total} < ${threshold}) }"; then
            echo "::warning::Coverage ${total}% below threshold ${threshold}% (no enforcement yet)"
          fi

  # Security scan opcional (no bloquea el PR)
  security-scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure private Go modules
        run: git config --global url."https://${{ secrets.CORE_REPO_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Download Go modules
        run: |
          go mod download "$CORE_GOVERNANCE_MODULE"
          go mod download

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...

name: CI PR a develop

on:
  pull_request:
    branches: [develop]

permissions:
  contents: read

env:
  GOPRIVATE: github.com/devpablocristo/*

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout core repo
        uses: actions/checkout@v4
        with:
          repository: devpablocristo/core
          token: ${{ secrets.CORE_REPO_READ_TOKEN }}
          path: core-repo

      - name: Link core repo for replace directives
        run: |
          EXPECTED_CORE_PATH="$(cd "$GITHUB_WORKSPACE/../.." && pwd)/core"
          mkdir -p "$(dirname "$EXPECTED_CORE_PATH")"
          rm -rf "$EXPECTED_CORE_PATH"
          ln -s "$GITHUB_WORKSPACE/core-repo" "$EXPECTED_CORE_PATH"

      - name: Configure private Go modules
        run: git config --global url."https://${{ secrets.CORE_REPO_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout core repo
        uses: actions/checkout@v4
        with:
          repository: devpablocristo/core
          token: ${{ secrets.CORE_REPO_READ_TOKEN }}
          path: core-repo

      - name: Link core repo for replace directives
        run: |
          EXPECTED_CORE_PATH="$(cd "$GITHUB_WORKSPACE/../.." && pwd)/core"
          mkdir -p "$(dirname "$EXPECTED_CORE_PATH")"
          rm -rf "$EXPECTED_CORE_PATH"
          ln -s "$GITHUB_WORKSPACE/core-repo" "$EXPECTED_CORE_PATH"

      - name: Configure private Go modules
        run: git config --global url."https://${{ secrets.CORE_REPO_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout core repo
        uses: actions/checkout@v4
        with:
          repository: devpablocristo/core
          token: ${{ secrets.CORE_REPO_READ_TOKEN }}
          path: core-repo

      - name: Link core repo for replace directives
        run: |
          EXPECTED_CORE_PATH="$(cd "$GITHUB_WORKSPACE/../.." && pwd)/core"
          mkdir -p "$(dirname "$EXPECTED_CORE_PATH")"
          rm -rf "$EXPECTED_CORE_PATH"
          ln -s "$GITHUB_WORKSPACE/core-repo" "$EXPECTED_CORE_PATH"

      - name: Configure private Go modules
        run: git config --global url."https://${{ secrets.CORE_REPO_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Tests
        run: go test ./...

  # Security scan opcional (no bloquea el PR)
  security-scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout core repo
        uses: actions/checkout@v4
        with:
          repository: devpablocristo/core
          token: ${{ secrets.CORE_REPO_READ_TOKEN }}
          path: core-repo

      - name: Link core repo for replace directives
        run: |
          EXPECTED_CORE_PATH="$(cd "$GITHUB_WORKSPACE/../.." && pwd)/core"
          mkdir -p "$(dirname "$EXPECTED_CORE_PATH")"
          rm -rf "$EXPECTED_CORE_PATH"
          ln -s "$GITHUB_WORKSPACE/core-repo" "$EXPECTED_CORE_PATH"

      - name: Configure private Go modules
        run: git config --global url."https://${{ secrets.CORE_REPO_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

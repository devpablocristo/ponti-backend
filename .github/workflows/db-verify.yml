name: DB Verify

on:
  workflow_dispatch: {}
  pull_request:
    branches:
      - develop

permissions:
  contents: read

jobs:
  db-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: DB Verify
        run: make db-verify

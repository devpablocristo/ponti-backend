name: Deploy to Cloud Run

on:
  push:
    branches:
      - dev
      - staging
      - main

env:
  PROJECT_ID: new-ponti-dev
  REGION: us-central1
  SERVICE_NAME: ponti-backend
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: ponti-backend-registry

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment based on branch
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "ENV=prod" >> $GITHUB_OUTPUT
            echo "TAG=prod" >> $GITHUB_OUTPUT
            echo "DEPLOY_ENV=prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "staging" ]]; then
            echo "ENV=stg" >> $GITHUB_OUTPUT
            echo "TAG=stg" >> $GITHUB_OUTPUT
            echo "DEPLOY_ENV=stg" >> $GITHUB_OUTPUT
          else
            echo "ENV=dev" >> $GITHUB_OUTPUT
            echo "TAG=dev" >> $GITHUB_OUTPUT
            echo "DEPLOY_ENV=dev" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ steps.env.outputs.TAG }} .
          docker tag ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ steps.env.outputs.TAG }} \
                     ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ steps.env.outputs.TAG }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ steps.env.outputs.TAG }} \
            --service-account=cloudrun-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --allow-unauthenticated \
            --set-env-vars="GO_ENVIRONMENT=production" \
            --set-env-vars="DEPLOY_ENV=${{ steps.env.outputs.DEPLOY_ENV }}" \
            --set-env-vars="DEPLOY_PLATFORM=gcp" \
            --set-env-vars="APP_NAME=ponti-api" \
            --set-env-vars="APP_VERSION=1.0" \
            --set-env-vars="APP_MAX_RETRIES=5" \
            --set-env-vars="X_API_KEY=${{ secrets.X_API_KEY }}" \
            --set-env-vars="API_VERSION=v1" \
            --set-env-vars="HTTP_SERVER_NAME=http-server" \
            --set-env-vars="HTTP_SERVER_HOST=0.0.0.0" \
            --set-env-vars="DB_TYPE=postgres" \
            --set-env-vars="DB_HOST=${{ secrets.DB_HOST }}" \
            --set-env-vars="DB_PORT=${{ secrets.DB_PORT }}" \
            --set-env-vars="DB_USER=${{ secrets.DB_USER }}" \
            --set-env-vars="DB_PASSWORD=${{ secrets.DB_PASS }}" \
            --set-env-vars="DB_NAME=${{ secrets.DB_NAME }}" \
            --set-env-vars="DB_SSL_MODE=${{ secrets.SSL_MODE }}" \
            --set-env-vars="MIGRATIONS_DIR=file://migrations" \
            --set-env-vars="WORDS_SUGGESTER_LIMIT=100" \
            --set-env-vars="WORDS_SUGGESTER_THRESHOLD=0.3" \
            --set-env-vars="REPORT_SCHEMA=v4_report"

      - name: Show deployment URL
        run: |
          echo "✅ Deployed to: https://${{ env.SERVICE_NAME }}-1087442197188.${{ env.REGION }}.run.app"

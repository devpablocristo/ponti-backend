name: Rollback PROD to previous release

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: "SHA PROD a restaurar (vacío = anterior al actual)"
        required: false
        default: ""
      confirm_migration_compatible:
        description: "Confirmo que el rollback de app es compatible con el schema actual"
        required: false
        type: boolean
        default: false
      reason:
        description: "Motivo / ticket (texto libre)"
        required: true

permissions:
  contents: read
  id-token: write
  deployments: write

concurrency:
  group: rollback-prod
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment:
      name: prod
    env:
      GCP_REGION: ${{ vars.GCP_REGION_PROD }}
      GCP_PROJECT_ID_PROD: ${{ vars.GCP_PROJECT_ID_PROD }}
      SERVICE_NAME_PROD: ${{ vars.SERVICE_NAME_PROD }}
      CLOUD_RUN_SERVICE_ACCOUNT_PROD: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT_PROD }}
      WIF_PROVIDER_PROD: ${{ vars.WIF_PROVIDER_PROD }}
      WIF_SERVICE_ACCOUNT_PROD: ${{ vars.WIF_SERVICE_ACCOUNT_PROD }}
      SECRET_DB_PASSWORD_NAME_PROD: db-password-prod
      SECRET_X_API_KEY_NAME_PROD: x-api-key-prod
      REQUIRE_AUTH_SMOKE: "0"
      CLOUDSQL_INSTANCE: ${{ vars.CLOUDSQL_INSTANCE_PROD }}
      DB_NAME: ${{ vars.DB_NAME_PROD }}
      DB_USER: ${{ vars.DB_USER_PROD }}
      API_VERSION: ${{ vars.API_VERSION }}
      HTTP_SERVER_NAME: ${{ vars.HTTP_SERVER_NAME }}
      HTTP_SERVER_HOST: ${{ vars.HTTP_SERVER_HOST }}
      DB_TYPE: ${{ vars.DB_TYPE }}
      DB_SSL_MODE: ${{ vars.DB_SSL_MODE }}
      DB_PORT: ${{ vars.DB_PORT }}
      MIGRATIONS_DIR: ${{ vars.MIGRATIONS_DIR }}
      WORDS_SUGGESTER_LIMIT: ${{ vars.WORDS_SUGGESTER_LIMIT }}
      WORDS_SUGGESTER_THRESHOLD: ${{ vars.WORDS_SUGGESTER_THRESHOLD }}
      REPORT_SCHEMA: ${{ vars.REPORT_SCHEMA }}
      SERVICE_ENV_NAME: ${{ vars.SERVICE_NAME_ENV }}
      SERVICE_ENV_MAX_RETRIES: ${{ vars.SERVICE_MAX_RETRIES_ENV }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve rollback target
        id: target
        run: python3 scripts/release/deployments.py resolve
        env:
          GH_TOKEN: ${{ github.token }}
          RESOLVE_ENV: prod
          RESOLVE_LABELS: PROD_PROMOTED,ROLLED_BACK
          RESOLVE_SHA: ${{ inputs.target_sha }}
          CURRENT_ENV: prod
          EXCLUDE_CURRENT_SHA: ${{ inputs.target_sha == '' && '1' || '0' }}

      - name: Resolve current PROD record
        id: current
        continue-on-error: true
        run: python3 scripts/release/deployments.py resolve
        env:
          GH_TOKEN: ${{ github.token }}
          RESOLVE_ENV: prod
          RESOLVE_LABELS: PROD_PROMOTED,ROLLED_BACK

      - name: Migration compatibility guard
        run: |
          current="${{ steps.current.outputs.migration_version }}"
          target="${{ steps.target.outputs.migration_version }}"
          if [[ -n "$current" && -n "$target" && "$current" != "$target" && "${{ inputs.confirm_migration_compatible }}" != "true" ]]; then
            echo "ERROR: target migration version ($target) differs from current prod record ($current)."
            echo "Re-run with confirm_migration_compatible=true only if this is an expand-contract safe rollback."
            exit 1
          fi

      - name: Auth GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER_PROD }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT_PROD }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID_PROD }}

      - name: Build metadata
        run: |
          target_sha="${{ steps.target.outputs.deploy_sha }}"
          short_sha="${target_sha::12}"
          echo "IMAGE_URI=${{ steps.target.outputs.image_uri }}" >> "$GITHUB_ENV"
          echo "SERVICE_GIT_SHA=${target_sha}" >> "$GITHUB_ENV"
          echo "SERVICE_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          echo "RELEASE_SERVICE_VERSION=prod-rollback-${short_sha}" >> "$GITHUB_ENV"

      - name: Deploy rollback image to Cloud Run (PROD)
        run: |
          DB_HOST="/cloudsql/${CLOUDSQL_INSTANCE}"
          ENV_VARS="GO_ENVIRONMENT=cloudrun,DEPLOY_ENV=prod,DEPLOY_PLATFORM=gcp,SERVICE_NAME=${SERVICE_ENV_NAME},SERVICE_VERSION=${RELEASE_SERVICE_VERSION},SERVICE_GIT_SHA=${SERVICE_GIT_SHA},SERVICE_BUILD_TIME=${SERVICE_BUILD_TIME},SERVICE_MAX_RETRIES=${SERVICE_ENV_MAX_RETRIES},API_VERSION=${API_VERSION},HTTP_SERVER_NAME=${HTTP_SERVER_NAME},HTTP_SERVER_HOST=${HTTP_SERVER_HOST},DB_TYPE=${DB_TYPE},DB_USER=${DB_USER},DB_HOST=${DB_HOST},DB_NAME=${DB_NAME},DB_SSL_MODE=${DB_SSL_MODE},DB_PORT=${DB_PORT},MIGRATIONS_DIR=${MIGRATIONS_DIR},WORDS_SUGGESTER_LIMIT=${WORDS_SUGGESTER_LIMIT},WORDS_SUGGESTER_THRESHOLD=${WORDS_SUGGESTER_THRESHOLD},REPORT_SCHEMA=${REPORT_SCHEMA},RUN_MIGRATIONS_ON_STARTUP=false,IDENTITY_PROJECT_ID=${GCP_PROJECT_ID_PROD}"
          gcloud run deploy "$SERVICE_NAME_PROD" \
            --project="$GCP_PROJECT_ID_PROD" \
            --region="$GCP_REGION" \
            --image="$IMAGE_URI" \
            --service-account="$CLOUD_RUN_SERVICE_ACCOUNT_PROD" \
            --add-cloudsql-instances="$CLOUDSQL_INSTANCE" \
            --set-env-vars="${ENV_VARS}" \
            --set-secrets="DB_PASSWORD=${SECRET_DB_PASSWORD_NAME_PROD}:latest,X_API_KEY=${SECRET_X_API_KEY_NAME_PROD}:latest" \
            --min-instances=1 \
            --allow-unauthenticated

      - name: Resolve service URL and revision
        run: |
          service_url="$(gcloud run services describe "$SERVICE_NAME_PROD" \
            --project="$GCP_PROJECT_ID_PROD" \
            --region="$GCP_REGION" \
            --format='value(status.url)')"
          revision="$(gcloud run services describe "$SERVICE_NAME_PROD" \
            --project="$GCP_PROJECT_ID_PROD" \
            --region="$GCP_REGION" \
            --format='value(status.latestReadyRevisionName)')"
          echo "SERVICE_URL=$service_url" >> "$GITHUB_ENV"
          echo "CLOUD_RUN_REVISION=$revision" >> "$GITHUB_ENV"

      - name: Resolve X-API-Key for smoke
        run: |
          x_api_key="${SMOKE_X_API_KEY:-}"
          if [[ -z "$x_api_key" ]]; then
            x_api_key="$(gcloud secrets versions access latest \
              --project="$GCP_PROJECT_ID_PROD" \
              --secret="$SECRET_X_API_KEY_NAME_PROD" 2>/dev/null || true)"
          fi
          if [[ -z "$x_api_key" ]]; then
            echo "ERROR: no se pudo resolver X-API-Key para PROD."
            exit 1
          fi
          echo "::add-mask::$x_api_key"
          echo "SMOKE_X_API_KEY=$x_api_key" >> "$GITHUB_ENV"
        env:
          SMOKE_X_API_KEY: ${{ secrets.X_API_KEY_PROD }}

      - name: Smoke release checks
        run: bash ./scripts/smoke_release.sh "$SERVICE_URL"
        env:
          X_API_KEY: ${{ env.SMOKE_X_API_KEY }}
          REQUIRE_AUTH_SMOKE: ${{ env.REQUIRE_AUTH_SMOKE }}

      - name: Record PROD rollback
        run: python3 scripts/release/deployments.py record
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_ENV: prod
          DEPLOY_SHA: ${{ steps.target.outputs.deploy_sha }}
          DEPLOY_STATUS_LABEL: ROLLED_BACK
          DEPLOY_STATE: success
          DEPLOY_DESCRIPTION: "PROD rollback to ${{ steps.target.outputs.deploy_sha }}"
          SERVICE_VERSION: ${{ env.RELEASE_SERVICE_VERSION }}
          MIGRATION_VERSION: ${{ steps.target.outputs.migration_version }}

name: Deploy to Cloud Run

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: Rama a desplegar (se despliega en dev)
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.event_name }}-${{ github.event.inputs.branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    env:
      DEPLOY_ENV: ""
      IMAGE_TAG: ""
      IMAGE_URI: ""
    environment: ${{ github.event_name == 'workflow_dispatch' && vars.DEPLOY_ENV_DEV || github.ref_name == 'develop' && vars.DEPLOY_ENV_DEV || github.ref_name == 'main' && vars.DEPLOY_ENV_PROD }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Set deploy variables
        env:
          BRANCH_INPUT: ${{ github.event.inputs.branch }}
          EVENT_NAME: ${{ github.event_name }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_PROJECT_ID_DEV: ${{ vars.GCP_PROJECT_ID_DEV }}
          GCP_PROJECT_ID_PROD: ${{ vars.GCP_PROJECT_ID_PROD }}
          ARTIFACT_REGISTRY: ${{ vars.ARTIFACT_REGISTRY }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          SERVICE_NAME_DEV: ${{ vars.SERVICE_NAME_DEV }}
          SERVICE_NAME_PROD: ${{ vars.SERVICE_NAME_PROD }}
          CLOUD_RUN_SERVICE_ACCOUNT_DEV: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT_DEV }}
          CLOUD_RUN_SERVICE_ACCOUNT_PROD: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT_PROD }}
          WIF_PROVIDER_DEV: ${{ vars.WIF_PROVIDER_DEV }}
          WIF_PROVIDER_PROD: ${{ vars.WIF_PROVIDER_PROD }}
          WIF_SERVICE_ACCOUNT_DEV: ${{ vars.WIF_SERVICE_ACCOUNT_DEV }}
          WIF_SERVICE_ACCOUNT_PROD: ${{ vars.WIF_SERVICE_ACCOUNT_PROD }}
        run: |
          ref="${GITHUB_REF_NAME}"
          deploy_env=""
          image_tag=""
          gcp_project_id=""
          service_name=""
          cloud_run_sa=""
          wif_provider=""
          wif_sa=""
          
          if [ -z "$GCP_REGION" ]; then
            echo "Missing GCP_REGION variable." >&2
            exit 1
          fi
          if [ -z "$ARTIFACT_REGISTRY" ]; then
            echo "Missing ARTIFACT_REGISTRY variable." >&2
            exit 1
          fi
          if [ -z "$IMAGE_NAME" ]; then
            echo "Missing IMAGE_NAME variable." >&2
            exit 1
          fi
          
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -z "$BRANCH_INPUT" ]; then
              echo "Missing required inputs" >&2
              exit 1
            fi
            deploy_env="${{ vars.DEPLOY_ENV_DEV }}"
            image_tag="${{ vars.IMAGE_TAG_DEV }}"
            gcp_project_id="$GCP_PROJECT_ID_DEV"
            # Servicio preview separado para NO pisar el servicio dev
            # Slug para DB (permite underscore); slug para servicio (solo guiones)
            BRANCH_SLUG_DB=$(echo "$BRANCH_INPUT" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/_/g' | cut -c1-40)
            BRANCH_SLUG_SERVICE=$(echo "$BRANCH_INPUT" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | cut -c1-40 | sed 's/^-//; s/-$//')
            service_name="${SERVICE_NAME_DEV}-preview-${BRANCH_SLUG_SERVICE}"
            echo "DB_NAME=branch_${BRANCH_SLUG_DB}" >> "$GITHUB_ENV"
            cloud_run_sa="$CLOUD_RUN_SERVICE_ACCOUNT_DEV"
            wif_provider="$WIF_PROVIDER_DEV"
            wif_sa="$WIF_SERVICE_ACCOUNT_DEV"
          else
            if [ "$ref" = "develop" ]; then
              deploy_env="${{ vars.DEPLOY_ENV_DEV }}"
              image_tag="${{ vars.IMAGE_TAG_DEV }}"
              gcp_project_id="$GCP_PROJECT_ID_DEV"
              service_name="$SERVICE_NAME_DEV"
              cloud_run_sa="$CLOUD_RUN_SERVICE_ACCOUNT_DEV"
              wif_provider="$WIF_PROVIDER_DEV"
              wif_sa="$WIF_SERVICE_ACCOUNT_DEV"
            elif [ "$ref" = "main" ]; then
              deploy_env="${{ vars.DEPLOY_ENV_PROD }}"
              image_tag="${{ vars.IMAGE_TAG_PROD }}"
              gcp_project_id="$GCP_PROJECT_ID_PROD"
              service_name="$SERVICE_NAME_PROD"
              cloud_run_sa="$CLOUD_RUN_SERVICE_ACCOUNT_PROD"
              wif_provider="$WIF_PROVIDER_PROD"
              wif_sa="$WIF_SERVICE_ACCOUNT_PROD"
            else
              echo "Unsupported branch: $ref (only develop and main are supported for automatic deployment)" >&2
              exit 1
            fi
          fi
          
          if [ -z "$gcp_project_id" ]; then
            echo "Missing GCP_PROJECT_ID for environment: $deploy_env" >&2
            exit 1
          fi
          if [ -z "$service_name" ]; then
            echo "Missing SERVICE_NAME for environment: $deploy_env" >&2
            exit 1
          fi
          if [ -z "$cloud_run_sa" ]; then
            echo "Missing CLOUD_RUN_SERVICE_ACCOUNT for environment: $deploy_env" >&2
            exit 1
          fi
          if [ -z "$wif_provider" ]; then
            echo "Missing WIF_PROVIDER for environment: $deploy_env" >&2
            exit 1
          fi
          if [ -z "$wif_sa" ]; then
            echo "Missing WIF_SERVICE_ACCOUNT for environment: $deploy_env" >&2
            exit 1
          fi

          printf 'DEPLOY_ENV=%s\n' "$deploy_env" >> "$GITHUB_ENV"
          printf 'IMAGE_TAG=%s\n' "$image_tag" >> "$GITHUB_ENV"
          printf 'GCP_PROJECT_ID=%s\n' "$gcp_project_id" >> "$GITHUB_ENV"
          printf 'SERVICE_NAME=%s\n' "$service_name" >> "$GITHUB_ENV"
          printf 'CLOUD_RUN_SERVICE_ACCOUNT=%s\n' "$cloud_run_sa" >> "$GITHUB_ENV"
          printf 'WIF_PROVIDER=%s\n' "$wif_provider" >> "$GITHUB_ENV"
          printf 'WIF_SERVICE_ACCOUNT=%s\n' "$wif_sa" >> "$GITHUB_ENV"

      - name: Set DB settings (no schema isolation)
        id: set_db
        env:
          EVENT_NAME: ${{ github.event_name }}
          DB_NAME: ${{ env.DB_NAME }}
        run: |
          # Política: el código es 1 (migraciones en public). La aislación para previews es por DB_NAME.
          echo "db_name=${DB_NAME}" >> "$GITHUB_OUTPUT"
          echo "DB_SCHEMA=public" >> "$GITHUB_ENV"
          echo "DB settings: DB_NAME=${DB_NAME}, DB_SCHEMA=public"

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Read DB_NAME from target service (push only)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        env:
          PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION }}
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
        run: |
          DB_NAME=$(gcloud run services describe "$SERVICE_NAME" --project="$PROJECT_ID" --region="$REGION" --format='value(spec.template.spec.containers[0].env[?name="DB_NAME"].value)')
          if [ -z "$DB_NAME" ]; then
            echo "::error::DB_NAME env var not found in Cloud Run service '$SERVICE_NAME'. Refusing to deploy without explicit DB_NAME."
            exit 1
          fi
          echo "DB_NAME=$DB_NAME" >> "$GITHUB_ENV"
          echo "::notice::Using DB_NAME from existing service config: $DB_NAME"

      - name: Ensure preview database exists (workflow_dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: ensure_preview_db
        env:
          PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION }}
          BASE_SERVICE_NAME: ${{ vars.SERVICE_NAME_DEV }}
          DB_NAME: ${{ env.DB_NAME }}
        run: |
          # 🔒 Guardrail: workflow_dispatch SOLO opera en DEV
          if [ "$PROJECT_ID" != "${{ vars.GCP_PROJECT_ID_DEV }}" ]; then
            echo "::error::SECURITY: workflow_dispatch must run only against DEV project. Got PROJECT_ID=$PROJECT_ID"
            exit 1
          fi

          # Obtener instancia Cloud SQL desde la configuración del servicio (no depende de secrets)
          # Esto se setea cuando el servicio tiene --add-cloudsql-instances.
          CLOUDSQL_INSTANCES=$(gcloud run services describe "$BASE_SERVICE_NAME" --project="$PROJECT_ID" --region="$REGION" --format='value(spec.template.metadata.annotations."run.googleapis.com/cloudsql-instances")')
          if [ -n "$CLOUDSQL_INSTANCES" ]; then
            # Puede venir como lista separada por coma; tomamos la primera
            INSTANCE_CONN=$(echo "$CLOUDSQL_INSTANCES" | cut -d, -f1)
          else
            echo "::warning::Cloud Run service '$BASE_SERVICE_NAME' has no annotation run.googleapis.com/cloudsql-instances (not connected to Cloud SQL?)"
            # Fallback: intentar inferir desde DB_HOST si estuviera seteado como valor plano
            DB_HOST=$(gcloud run services describe "$BASE_SERVICE_NAME" --project="$PROJECT_ID" --region="$REGION" --format='value(spec.template.spec.containers[0].env[?name="DB_HOST"].value)')
            if [ -z "$DB_HOST" ]; then
              echo "::error::CLOUDSQL_INSTANCE_INFERENCE_FAILED_V2: missing service annotation 'run.googleapis.com/cloudsql-instances' and DB_HOST not set."
              exit 1
            fi
            if echo "$DB_HOST" | grep -q '^/cloudsql/'; then
              INSTANCE_CONN=$(echo "$DB_HOST" | sed 's#^/cloudsql/##')
            else
              # Fallback: inferir instancia por IP pública del DB_HOST
              INSTANCE_CONN=$(gcloud sql instances list --project="$PROJECT_ID" --format='json(name,connectionName,ipAddresses)' | python -c 'import json,sys; host=sys.argv[1]; items=json.load(sys.stdin); match="";\nfor item in items:\n  for ip in item.get("ipAddresses", []):\n    if ip.get("ipAddress")==host:\n      match=item.get("connectionName","");\n      break\n  if match:\n    break\nprint(match)\n' "$DB_HOST")
              if [ -z "$INSTANCE_CONN" ]; then
                echo "::error::CLOUDSQL_INSTANCE_INFERENCE_FAILED_V3: DB_HOST '${DB_HOST}' no coincide con IP de ninguna instancia en el proyecto."
                exit 1
              fi
            fi
          fi

          if [ -z "$INSTANCE_CONN" ]; then
            echo "::error::Failed to infer Cloud SQL instance connection name from service '$BASE_SERVICE_NAME'."
            exit 1
          fi

          INSTANCE_PROJECT=$(echo "$INSTANCE_CONN" | cut -d: -f1)
          INSTANCE_NAME=$(echo "$INSTANCE_CONN" | cut -d: -f3)
          if [ -z "$INSTANCE_PROJECT" ] || [ -z "$INSTANCE_NAME" ]; then
            echo "::error::Failed to parse Cloud SQL instance from INSTANCE_CONN='$INSTANCE_CONN'"
            exit 1
          fi

          # 🔒 Guardrail: la instancia debe pertenecer al proyecto DEV (evita tocar prod por error de configuración)
          if [ "$INSTANCE_PROJECT" != "${{ vars.GCP_PROJECT_ID_DEV }}" ]; then
            echo "::error::SECURITY: Cloud SQL instance project mismatch. Expected DEV project '${{ vars.GCP_PROJECT_ID_DEV }}' but got '$INSTANCE_PROJECT' from INSTANCE_CONN='$INSTANCE_CONN'"
            exit 1
          fi

          # Guardrails: solo permitimos DBs de preview con prefijo branch_
          if ! echo "$DB_NAME" | grep -q '^branch_'; then
            echo "::error::SECURITY: preview DB_NAME must start with 'branch_'. Got: $DB_NAME"
            exit 1
          fi

          # 🔒 Guardrail: JAMÁS borrar/crear DBs principales por accidente
          # (se controla por prefijo branch_ + proyecto dev)

          echo "::notice::Using preview database: ${DB_NAME} (instance: ${INSTANCE_CONN})"

          echo "::warning::Reset automático: DROPPING database ${DB_NAME}"
          gcloud sql databases delete "$DB_NAME" --project="$INSTANCE_PROJECT" --instance="$INSTANCE_NAME" --quiet || true

          echo "instance_project=${INSTANCE_PROJECT}" >> "$GITHUB_OUTPUT"
          echo "instance_name=${INSTANCE_NAME}" >> "$GITHUB_OUTPUT"
          echo "instance_conn=${INSTANCE_CONN}" >> "$GITHUB_OUTPUT"

          # Crear si no existe (idempotente)
          if gcloud sql databases describe "$DB_NAME" --project="$INSTANCE_PROJECT" --instance="$INSTANCE_NAME" >/dev/null 2>&1; then
            echo "Database already exists: $DB_NAME"
          else
            echo "Creating database: $DB_NAME"
            gcloud sql databases create "$DB_NAME" --project="$INSTANCE_PROJECT" --instance="$INSTANCE_NAME"
          fi

      - name: Seed preview database from sanitized snapshot (workflow_dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          PROJECT_ID: ${{ steps.ensure_preview_db.outputs.instance_project }}
          INSTANCE_NAME: ${{ steps.ensure_preview_db.outputs.instance_name }}
          DB_NAME: ${{ env.DB_NAME }}
        run: |
          # Buscar bucket de backups en el proyecto (sin hardcodear)
          BUCKET_NAME=$(gcloud storage buckets list --project="$PROJECT_ID" --format='value(name)' | python -c 'import sys; buckets=[line.strip() for line in sys.stdin if line.strip()]; name=next((b for b in buckets if "backup" in b and "dev" in b), buckets[0] if buckets else ""); print(name)')

          if [ -z "$BUCKET_NAME" ]; then
            echo "::error::No se encontró bucket de backups en el proyecto $PROJECT_ID."
            exit 1
          fi

          BASE_SERVICE_NAME="${{ vars.SERVICE_NAME_DEV }}"
          SOURCE_DB_NAME=$(gcloud run services describe "$BASE_SERVICE_NAME" --project="$PROJECT_ID" --region="${{ vars.GCP_REGION }}" --format='value(spec.template.spec.containers[0].env[?name="DB_NAME"].value)')
          if [ -z "$SOURCE_DB_NAME" ]; then
            echo "::error::No se pudo inferir DB_NAME de origen desde el servicio base '$BASE_SERVICE_NAME'."
            exit 1
          fi
          if echo "$SOURCE_DB_NAME" | grep -q '^branch_'; then
            echo "::error::SECURITY: DB_NAME de origen no puede ser branch_*. Got: $SOURCE_DB_NAME"
            exit 1
          fi

          TS=$(date +"%Y%m%d_%H%M%S")
          SEED_URI="gs://${BUCKET_NAME}/preview-seeds/preview_seed_${DB_NAME}_${TS}.sql.gz"
          echo "::notice::Exportando snapshot desde ${SOURCE_DB_NAME} a ${SEED_URI}..."
          gcloud sql export sql "$INSTANCE_NAME" "$SEED_URI" --project="$PROJECT_ID" --database="$SOURCE_DB_NAME" --offload --quiet

          echo "::notice::Importando snapshot ${SEED_URI} en ${DB_NAME}..."
          gcloud sql import sql "$INSTANCE_NAME" "$SEED_URI" --project="$PROJECT_ID" --database="$DB_NAME" --quiet

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build image
        run: |
          image_uri="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY }}/${{ vars.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          docker build -t "$image_uri" .

      - name: Push image
        run: |
          image_uri="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY }}/${{ vars.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          docker push "$image_uri"

      - name: Deploy to Cloud Run
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          image_uri="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY }}/${{ vars.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          DB_NAME="${{ env.DB_NAME }}"

          # 🔒 Guardrail: en deploys automáticos, no permitir DB_NAME de preview
          if [ "$EVENT_NAME" != "workflow_dispatch" ] && echo "$DB_NAME" | grep -q '^branch_'; then
            echo "::error::SECURITY: automatic deploy must not use preview DB_NAME (branch_*). Got: $DB_NAME"
            exit 1
          fi
          
          # Logs: en workflow_dispatch aislamos por DB_NAME, no por schema
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "::notice::✅ PREVIEW DEPLOY: using isolated database DB_NAME=${DB_NAME} (schema public)"
          else
            echo "::notice::Deploy: using fixed database DB_NAME=${DB_NAME} (schema public)"
          fi
          
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # Para previews, copiar envs base del servicio dev y pisar solo las claves necesarias
            BASE_SERVICE_NAME="${{ vars.SERVICE_NAME_DEV }}"
            BASE_ENV_JSON=$(gcloud run services describe "$BASE_SERVICE_NAME" --project="${{ env.GCP_PROJECT_ID }}" --region="${{ vars.GCP_REGION }}" --format='json(spec.template.spec.containers[0].env)')
            BASE_ENV_VARS=$(python -c 'import json,sys; payload=json.load(sys.stdin); envs=payload.get("spec",{}).get("template",{}).get("spec",{}).get("containers",[{}])[0].get("env",[]); override={"DB_NAME","DB_SCHEMA","HTTP_SERVER_PORT","GO_ENVIRONMENT","DEPLOY_ENV","DEPLOY_PLATFORM","DEPLOY_PROJECT_ROOT"}; parts=[item.get("name") + "=" + str(item.get("value")) for item in envs if item.get("name") and item.get("value") is not None and item.get("name") not in override]; sys.stdout.write(",".join(parts))' <<<"$BASE_ENV_JSON")
            ENV_VARS="${BASE_ENV_VARS},DB_NAME=${DB_NAME},DB_SCHEMA=public,HTTP_SERVER_PORT=8080,GO_ENVIRONMENT=cloudrun,DEPLOY_ENV=${{ env.DEPLOY_ENV }},DEPLOY_PLATFORM=gcp,DEPLOY_PROJECT_ROOT=/app"
            ENV_FLAG="--set-env-vars=${ENV_VARS}"
          else
            # --update-env-vars preserva las variables existentes y solo agrega/actualiza las especificadas
            ENV_VARS="DB_NAME=${DB_NAME},DB_SCHEMA=public,HTTP_SERVER_PORT=8080,GO_ENVIRONMENT=cloudrun,DEPLOY_ENV=${{ env.DEPLOY_ENV }},DEPLOY_PLATFORM=gcp,DEPLOY_PROJECT_ROOT=/app"
            ENV_FLAG="--update-env-vars=${ENV_VARS}"
          fi
          
          if [ "${{ env.DEPLOY_ENV }}" = "prod" ]; then
            gcloud run deploy "${{ env.SERVICE_NAME }}" \
              --project="${{ env.GCP_PROJECT_ID }}" \
              --region="${{ vars.GCP_REGION }}" \
              --image="$image_uri" \
              --service-account="${{ env.CLOUD_RUN_SERVICE_ACCOUNT }}" \
              ${ENV_FLAG} \
              --no-allow-unauthenticated
          else
            gcloud run deploy "${{ env.SERVICE_NAME }}" \
              --project="${{ env.GCP_PROJECT_ID }}" \
              --region="${{ vars.GCP_REGION }}" \
              --image="$image_uri" \
              --service-account="${{ env.CLOUD_RUN_SERVICE_ACCOUNT }}" \
              ${ENV_FLAG} \
              --allow-unauthenticated
          fi
          echo "Deployed with DB_NAME=${DB_NAME}, DB_SCHEMA=public, HTTP_SERVER_PORT=8080"
          echo "Existing environment variables are preserved (--update-env-vars merges, not replaces)"
name: Deploy to Cloud Run

on:
  push:
    branches:
      - develop
      - staging
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: Rama a desplegar (se despliega en dev)
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    env:
      DEPLOY_ENV: ""
      IMAGE_TAG: ""
      IMAGE_URI: ""
    environment: ${{ github.event_name == 'workflow_dispatch' && vars.DEPLOY_ENV_DEV || github.ref_name == 'develop' && vars.DEPLOY_ENV_DEV || github.ref_name == 'staging' && vars.DEPLOY_ENV_STG || github.ref_name == 'main' && vars.DEPLOY_ENV_PROD }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Set deploy variables
        env:
          BRANCH_INPUT: ${{ github.event.inputs.branch }}
          EVENT_NAME: ${{ github.event_name }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          ARTIFACT_REGISTRY: ${{ vars.ARTIFACT_REGISTRY }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          SERVICE_NAME: ${{ vars.SERVICE_NAME }}
        run: |
          ref="${GITHUB_REF_NAME}"
          deploy_env=""
          image_tag=""
          if [ -z "$GCP_REGION" ]; then
            echo "Missing GCP_REGION variable." >&2
            exit 1
          fi
          if [ -z "$GCP_PROJECT_ID" ]; then
            echo "Missing GCP_PROJECT_ID variable." >&2
            exit 1
          fi
          if [ -z "$ARTIFACT_REGISTRY" ]; then
            echo "Missing ARTIFACT_REGISTRY variable." >&2
            exit 1
          fi
          if [ -z "$IMAGE_NAME" ]; then
            echo "Missing IMAGE_NAME variable." >&2
            exit 1
          fi
          if [ -z "$SERVICE_NAME" ]; then
            echo "Missing SERVICE_NAME variable." >&2
            exit 1
          fi
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -z "$BRANCH_INPUT" ]; then
              echo "Missing required inputs" >&2
              exit 1
            fi
            deploy_env="${{ vars.DEPLOY_ENV_DEV }}"
            image_tag="${{ vars.IMAGE_TAG_DEV }}"
          else
            if [ "$ref" = "develop" ]; then
              deploy_env="${{ vars.DEPLOY_ENV_DEV }}"
              image_tag="${{ vars.IMAGE_TAG_DEV }}"
            elif [ "$ref" = "staging" ]; then
              deploy_env="${{ vars.DEPLOY_ENV_STG }}"
              image_tag="${{ vars.IMAGE_TAG_STG }}"
            elif [ "$ref" = "main" ]; then
              deploy_env="${{ vars.DEPLOY_ENV_PROD }}"
              image_tag="${{ vars.IMAGE_TAG_PROD }}"
            else
              echo "Unsupported branch: $ref" >&2
              exit 1
            fi
          fi

          printf 'DEPLOY_ENV=%s\n' "$deploy_env" >> "$GITHUB_ENV"
          printf 'IMAGE_TAG=%s\n' "$image_tag" >> "$GITHUB_ENV"

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build image
        run: |
          image_uri="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY }}/${{ vars.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          docker build -t "$image_uri" .

      - name: Push image
        run: |
          image_uri="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY }}/${{ vars.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          docker push "$image_uri"

      - name: Deploy to Cloud Run
        run: |
          image_uri="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY }}/${{ vars.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          gcloud run deploy "${{ vars.SERVICE_NAME }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --region="${{ vars.GCP_REGION }}" \
            --image="$image_uri" \
            --service-account="${{ vars.CLOUD_RUN_SERVICE_ACCOUNT }}" \
            --allow-unauthenticated
name: Deploy STAGING (Cloud Run)

on:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "migrations_v4/**"
      - "scripts/**"
      - "Dockerfile"
      - ".github/workflows/deploy-staging.yml"
  workflow_dispatch:
    inputs:
      ref:
        description: "Rama o ref a desplegar (default: main)"
        required: false
        default: "main"

permissions:
  contents: read
  id-token: write
  deployments: write

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID_STG }}
      ARTIFACT_REGISTRY: ${{ vars.ARTIFACT_REGISTRY }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      SERVICE_NAME: ${{ vars.SERVICE_NAME_STG }}
      CLOUD_RUN_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT_STG }}
      WIF_PROVIDER: ${{ vars.WIF_PROVIDER_STG }}
      WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT_STG }}
      SECRET_DB_PASSWORD_NAME: db-password-stg
      SECRET_X_API_KEY_NAME: x-api-key-stg
      COMPANION_BASE_URL: ${{ vars.COMPANION_BASE_URL_STG }}
      COMPANION_INTERNAL_JWT_ISSUER: ponti-backend
      COMPANION_INTERNAL_JWT_AUDIENCE: companion
      COMPANION_INTERNAL_JWT_TTL_SEC: "300"
      COMPANION_TIMEOUT_MS: "300000"
      COMPANION_MAX_RETRIES: "2"
      SECRET_COMPANION_INTERNAL_JWT_SECRET_NAME: companion-internal-jwt-secret-stg
      NEXUS_BASE_URL: ${{ vars.NEXUS_BASE_URL_STG }}
      CLOUDSQL_PROXY_PORT: "55432"
      REQUIRE_AUTH_SMOKE: "0"
      CLOUDSQL_INSTANCE: ${{ vars.CLOUDSQL_INSTANCE_STG }}
      DB_NAME: ${{ vars.DB_NAME_STG }}
      DB_USER: ${{ vars.DB_USER_STG }}
      API_VERSION: ${{ vars.API_VERSION }}
      HTTP_SERVER_NAME: ${{ vars.HTTP_SERVER_NAME }}
      HTTP_SERVER_HOST: ${{ vars.HTTP_SERVER_HOST }}
      DB_TYPE: ${{ vars.DB_TYPE }}
      DB_SSL_MODE: ${{ vars.DB_SSL_MODE }}
      DB_PORT: ${{ vars.DB_PORT }}
      MIGRATIONS_DIR: ${{ vars.MIGRATIONS_DIR }}
      WORDS_SUGGESTER_LIMIT: ${{ vars.WORDS_SUGGESTER_LIMIT }}
      WORDS_SUGGESTER_THRESHOLD: ${{ vars.WORDS_SUGGESTER_THRESHOLD }}
      REPORT_SCHEMA: ${{ vars.REPORT_SCHEMA }}
      SERVICE_ENV_NAME: ${{ vars.SERVICE_NAME_ENV }}
      SERVICE_ENV_VERSION: ${{ vars.SERVICE_VERSION_ENV }}
      SERVICE_ENV_MAX_RETRIES: ${{ vars.SERVICE_MAX_RETRIES_ENV }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Resolve deploy SHA
        run: |
          set -euo pipefail
          deploy_sha="$(git rev-parse HEAD)"
          if [[ ! "$deploy_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "ERROR: invalid deploy SHA: $deploy_sha"
            exit 1
          fi
          echo "DEPLOY_SHA=$deploy_sha" >> "$GITHUB_ENV"
          echo "DEPLOY_SHORT_SHA=${deploy_sha::12}" >> "$GITHUB_ENV"

      - name: Auth GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Build metadata
        run: |
          set -euo pipefail
          echo "SERVICE_GIT_SHA=${DEPLOY_SHA}" >> "$GITHUB_ENV"
          echo "SERVICE_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          echo "RELEASE_SERVICE_VERSION=stg-${DEPLOY_SHORT_SHA}" >> "$GITHUB_ENV"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build y push imagen
        env:
          GO_MODULES_TOKEN: ${{ secrets.CORE_REPO_READ_TOKEN }}
        run: |
          set -euo pipefail
          IMAGE_TAG="${DEPLOY_SHA}"
          image_uri="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker build --secret id=go_modules_token,env=GO_MODULES_TOKEN -t "$image_uri" .
          docker push "$image_uri"
          echo "IMAGE_URI=$image_uri" >> "$GITHUB_ENV"

      - name: Deploy a Cloud Run (STAGING)
        run: |
          DB_HOST="/cloudsql/${CLOUDSQL_INSTANCE}"
          ENV_VARS="GO_ENVIRONMENT=cloudrun,DEPLOY_ENV=staging,DEPLOY_PLATFORM=gcp,SERVICE_NAME=${SERVICE_ENV_NAME},SERVICE_VERSION=${RELEASE_SERVICE_VERSION},SERVICE_GIT_SHA=${SERVICE_GIT_SHA},SERVICE_BUILD_TIME=${SERVICE_BUILD_TIME},SERVICE_MAX_RETRIES=${SERVICE_ENV_MAX_RETRIES},API_VERSION=${API_VERSION},HTTP_SERVER_NAME=${HTTP_SERVER_NAME},HTTP_SERVER_HOST=${HTTP_SERVER_HOST},DB_TYPE=${DB_TYPE},DB_USER=${DB_USER},DB_HOST=${DB_HOST},DB_NAME=${DB_NAME},DB_SSL_MODE=${DB_SSL_MODE},DB_PORT=${DB_PORT},MIGRATIONS_DIR=${MIGRATIONS_DIR},WORDS_SUGGESTER_LIMIT=${WORDS_SUGGESTER_LIMIT},WORDS_SUGGESTER_THRESHOLD=${WORDS_SUGGESTER_THRESHOLD},REPORT_SCHEMA=${REPORT_SCHEMA},RUN_MIGRATIONS_ON_STARTUP=true,IDENTITY_PROJECT_ID=${GCP_PROJECT_ID},COMPANION_BASE_URL=${COMPANION_BASE_URL},COMPANION_INTERNAL_JWT_ISSUER=${COMPANION_INTERNAL_JWT_ISSUER},COMPANION_INTERNAL_JWT_AUDIENCE=${COMPANION_INTERNAL_JWT_AUDIENCE},COMPANION_INTERNAL_JWT_TTL_SEC=${COMPANION_INTERNAL_JWT_TTL_SEC},COMPANION_TIMEOUT_MS=${COMPANION_TIMEOUT_MS},COMPANION_MAX_RETRIES=${COMPANION_MAX_RETRIES},NEXUS_BASE_URL=${NEXUS_BASE_URL}"
          gcloud run deploy "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="$IMAGE_URI" \
            --service-account="$CLOUD_RUN_SERVICE_ACCOUNT" \
            --add-cloudsql-instances="$CLOUDSQL_INSTANCE" \
            --set-env-vars="${ENV_VARS}" \
            --set-secrets="DB_PASSWORD=${SECRET_DB_PASSWORD_NAME}:latest,X_API_KEY=${SECRET_X_API_KEY_NAME}:latest,COMPANION_INTERNAL_JWT_SECRET=${SECRET_COMPANION_INTERNAL_JWT_SECRET_NAME}:latest" \
            --allow-unauthenticated

      - name: Resolve service URL (STAGING)
        run: |
          service_url="$(gcloud run services describe "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='value(status.url)')"
          if [[ -z "$service_url" ]]; then
            echo "ERROR: no se pudo resolver status.url del servicio STAGING."
            exit 1
          fi
          echo "SERVICE_URL=$service_url" >> "$GITHUB_ENV"

      - name: Resolve Cloud Run revision (STAGING)
        run: |
          revision="$(gcloud run services describe "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='value(status.latestReadyRevisionName)')"
          echo "CLOUD_RUN_REVISION=$revision" >> "$GITHUB_ENV"

      - name: "Guardrail: traffic/latest + detagged service URLs (STAGING)"
        run: |
          service_json="$(gcloud run services describe "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='json')"
          SERVICE_JSON="$service_json" python3 - <<'PY'
          import json, os, sys
          svc = json.loads(os.environ["SERVICE_JSON"])
          traffic = svc.get("status", {}).get("traffic", [])
          ok_latest = any(t.get("latestRevision") is True and int(t.get("percent", 0)) == 100 for t in traffic)
          if not ok_latest:
              print("ERROR: guardrail falló: tráfico no está 100% en latestRevision.")
              sys.exit(1)
          envs = svc.get("spec", {}).get("template", {}).get("spec", {}).get("containers", [{}])[0].get("env", [])
          bad = []
          watched = {"BASE_MANAGER_API", "COMPANION_BASE_URL", "NEXUS_BASE_URL"}
          for e in envs:
              name = e.get("name", "")
              value = e.get("value", "")
              if not value:
                  continue
              if name in watched or name.endswith("_URL"):
                  if "---" in value:
                      bad.append(f"{name}={value}")
          if bad:
              print("ERROR: guardrail falló: URLs internas taggeadas detectadas:")
              for item in bad:
                  print(f" - {item}")
              sys.exit(1)
          print("Guardrail OK: latestRevision=100% y sin URLs taggeadas.")
          PY

      - name: Resolve DB password for schema checks (STAGING)
        run: |
          db_password="${SMOKE_DB_PASSWORD:-}"
          if [[ -z "$db_password" ]]; then
            db_password="$(gcloud secrets versions access latest \
              --project="$GCP_PROJECT_ID" \
              --secret="$SECRET_DB_PASSWORD_NAME" 2>/dev/null || true)"
          fi
          if [[ -z "$db_password" ]]; then
            echo "ERROR: no se pudo resolver DB password para schema checks en STAGING."
            exit 1
          fi
          echo "::add-mask::$db_password"
          echo "SMOKE_DB_PASSWORD=$db_password" >> "$GITHUB_ENV"
        env:
          SMOKE_DB_PASSWORD: ${{ secrets.DB_PASSWORD_STG }}

      - name: Start Cloud SQL Proxy for schema checks (STAGING)
        run: |
          token="$(gcloud auth print-access-token)"
          docker rm -f cloudsql-proxy-deploy-stg >/dev/null 2>&1 || true
          instance_connection="$CLOUDSQL_INSTANCE"
          if [[ "$instance_connection" != *:*:* ]]; then
            instance_connection="${GCP_PROJECT_ID}:${GCP_REGION}:${CLOUDSQL_INSTANCE}"
          fi
          docker run -d --name cloudsql-proxy-deploy-stg \
            -p "127.0.0.1:${CLOUDSQL_PROXY_PORT}:5432" \
            gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0 \
            --address 0.0.0.0 \
            --port 5432 \
            --token "$token" \
            "$instance_connection" >/dev/null
          for i in {1..30}; do
            if PGPASSWORD="$SMOKE_DB_PASSWORD" pg_isready -h 127.0.0.1 -p "$CLOUDSQL_PROXY_PORT" -U "$DB_USER" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: cloud sql proxy no quedó listo en STAGING"
          exit 1

      - name: Schema guardrails (STAGING)
        run: |
          chmod +x scripts/check_schema_guardrails.sh
          DB_HOST=127.0.0.1 \
          DB_PORT="$CLOUDSQL_PROXY_PORT" \
          DB_USER="$DB_USER" \
          DB_NAME="$DB_NAME" \
          DB_PASSWORD="$SMOKE_DB_PASSWORD" \
          MIGRATIONS_DIR="migrations_v4" \
          scripts/check_schema_guardrails.sh

      - name: Resolve X-API-Key for smoke (STAGING)
        run: |
          x_api_key="${SMOKE_X_API_KEY:-}"
          if [[ -z "$x_api_key" ]]; then
            x_api_key="$(gcloud secrets versions access latest \
              --project="$GCP_PROJECT_ID" \
              --secret="$SECRET_X_API_KEY_NAME" 2>/dev/null || true)"
          fi
          if [[ -z "$x_api_key" ]]; then
            echo "ERROR: no se pudo resolver X-API-Key (GitHub secret o Secret Manager) en STAGING."
            exit 1
          fi
          echo "::add-mask::$x_api_key"
          echo "SMOKE_X_API_KEY=$x_api_key" >> "$GITHUB_ENV"
        env:
          SMOKE_X_API_KEY: ${{ secrets.X_API_KEY_STG }}

      - name: Resolve auth token for functional smoke (STAGING)
        run: |
          token="${SMOKE_AUTH_BEARER_TOKEN:-}"
          if [[ -z "$token" ]]; then
            echo "WARN: SMOKE_AUTH_BEARER_TOKEN no configurado; se ejecutará smoke no autenticado."
          else
            echo "::add-mask::$token"
            echo "AUTH_BEARER_TOKEN=$token" >> "$GITHUB_ENV"
          fi
        env:
          SMOKE_AUTH_BEARER_TOKEN: ${{ secrets.SMOKE_AUTH_BEARER_TOKEN_STG }}

      - name: Smoke release checks (STAGING)
        run: |
          bash ./scripts/smoke_release.sh "$SERVICE_URL"
        env:
          X_API_KEY: ${{ env.SMOKE_X_API_KEY }}
          AUTH_BEARER_TOKEN: ${{ env.AUTH_BEARER_TOKEN }}
          REQUIRE_AUTH_SMOKE: ${{ env.REQUIRE_AUTH_SMOKE }}

      - name: Record STAGING deployment
        run: |
          set -euo pipefail
          DEPLOY_DESCRIPTION="STAGING smoke OK ${DEPLOY_SHA}" \
          SERVICE_VERSION="${RELEASE_SERVICE_VERSION}" \
          python3 scripts/release/deployments.py record
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_ENV: staging
          DEPLOY_STATUS_LABEL: SMOKE_OK
          DEPLOY_STATE: success
          MIGRATIONS_DIR_FOR_RELEASE: migrations_v4

      - name: Stop Cloud SQL Proxy (STAGING)
        if: ${{ always() }}
        run: docker rm -f cloudsql-proxy-deploy-stg >/dev/null 2>&1 || true

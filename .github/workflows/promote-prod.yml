name: Promote to PROD

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA probado en STAGING"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  promote:
    runs-on: ubuntu-latest
    environment:
      name: prod
    env:
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_PROJECT_ID_STG: ${{ vars.GCP_PROJECT_ID_STG }}
      GCP_PROJECT_ID_PROD: ${{ vars.GCP_PROJECT_ID_PROD }}
      ARTIFACT_REGISTRY: ${{ vars.ARTIFACT_REGISTRY }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      SERVICE_NAME: ${{ vars.SERVICE_NAME_PROD }}
      CLOUD_RUN_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT_PROD }}
      WIF_PROVIDER: ${{ vars.WIF_PROVIDER_PROD }}
      WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT_PROD }}
      CLOUDSQL_INSTANCE: ${{ vars.CLOUDSQL_INSTANCE_PROD }}
      DB_NAME: ${{ vars.DB_NAME_PROD }}
      DB_USER: ${{ vars.DB_USER_PROD }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD_PROD }}
      X_API_KEY: ${{ secrets.X_API_KEY_PROD }}
      API_VERSION: ${{ vars.API_VERSION }}
      HTTP_SERVER_NAME: ${{ vars.HTTP_SERVER_NAME }}
      HTTP_SERVER_HOST: ${{ vars.HTTP_SERVER_HOST }}
      DB_TYPE: ${{ vars.DB_TYPE }}
      DB_SSL_MODE: ${{ vars.DB_SSL_MODE }}
      DB_PORT: ${{ vars.DB_PORT }}
      MIGRATIONS_DIR: ${{ vars.MIGRATIONS_DIR }}
      WORDS_SUGGESTER_LIMIT: ${{ vars.WORDS_SUGGESTER_LIMIT }}
      WORDS_SUGGESTER_THRESHOLD: ${{ vars.WORDS_SUGGESTER_THRESHOLD }}
      REPORT_SCHEMA: ${{ vars.REPORT_SCHEMA }}
      SERVICE_ENV_NAME: ${{ vars.SERVICE_NAME_ENV }}
      SERVICE_ENV_VERSION: ${{ vars.SERVICE_VERSION_ENV }}
      SERVICE_ENV_MAX_RETRIES: ${{ vars.SERVICE_MAX_RETRIES_ENV }}
    steps:
      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID_PROD }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Promover artefacto (sin rebuild)
        env:
          IMAGE_TAG: ${{ github.event.inputs.commit_sha }}
        run: |
          SRC_IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID_STG}/${ARTIFACT_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          DST_IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID_PROD}/${ARTIFACT_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker pull "$SRC_IMAGE"
          docker tag "$SRC_IMAGE" "$DST_IMAGE"
          docker push "$DST_IMAGE"
          echo "IMAGE_URI=$DST_IMAGE" >> "$GITHUB_ENV"

      - name: Deploy a Cloud Run (PROD)
        run: |
          DB_HOST="/cloudsql/${CLOUDSQL_INSTANCE}"
          ENV_VARS="GO_ENVIRONMENT=cloudrun,DEPLOY_ENV=prod,DEPLOY_PLATFORM=gcp,SERVICE_NAME=${SERVICE_ENV_NAME},SERVICE_VERSION=${SERVICE_ENV_VERSION},SERVICE_MAX_RETRIES=${SERVICE_ENV_MAX_RETRIES},X_API_KEY=${X_API_KEY},API_VERSION=${API_VERSION},HTTP_SERVER_NAME=${HTTP_SERVER_NAME},HTTP_SERVER_HOST=${HTTP_SERVER_HOST},DB_TYPE=${DB_TYPE},DB_USER=${DB_USER},DB_PASSWORD=${DB_PASSWORD},DB_HOST=${DB_HOST},DB_NAME=${DB_NAME},DB_SSL_MODE=${DB_SSL_MODE},DB_PORT=${DB_PORT},MIGRATIONS_DIR=${MIGRATIONS_DIR},WORDS_SUGGESTER_LIMIT=${WORDS_SUGGESTER_LIMIT},WORDS_SUGGESTER_THRESHOLD=${WORDS_SUGGESTER_THRESHOLD},REPORT_SCHEMA=${REPORT_SCHEMA}"
          gcloud run deploy "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID_PROD" \
            --region="$GCP_REGION" \
            --image="$IMAGE_URI" \
            --service-account="$CLOUD_RUN_SERVICE_ACCOUNT" \
            --add-cloudsql-instances="$CLOUDSQL_INSTANCE" \
            --set-env-vars="${ENV_VARS}" \
            --no-allow-unauthenticated

name: Reset DB (DEV) from STAGING

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: reset-db-dev
  cancel-in-progress: false

jobs:
  reset:
    runs-on: ubuntu-latest
    environment:
      name: dev
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID_DEV }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      WIF_PROVIDER: ${{ vars.WIF_PROVIDER_DEV }}
      WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT_DEV }}
      DB_USER: ${{ vars.DB_USER_DEV }}
      SECRET_DB_PASSWORD_NAME: db-password-dev
      CLOUDSQL_PROXY_PORT: "55432"
      # Hard guardrails: if these do not match, the workflow must fail fast.
      EXPECTED_GCP_PROJECT_ID: new-ponti-dev
      EXPECTED_DB_INSTANCE_NAME_DEV: new-ponti-db-dev
      EXPECTED_DEV_DB_NAME: new_ponti_db_dev
      EXPECTED_STG_DB_NAME: new_ponti_db_staging
      DB_INSTANCE_NAME_DEV: ${{ vars.DB_INSTANCE_NAME_DEV }}
      DB_NAME_DEV: ${{ vars.DB_NAME_DEV }}
      # Fuente: STAGING (vive en la misma instancia unificada)
      DB_NAME_STG: ${{ vars.DB_NAME_STG }}
      HARDENING_SQL_URI: ${{ vars.HARDENING_SQL_URI }}
      SMOKE_TEST_URL: ${{ vars.SMOKE_TEST_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Auth GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Validar config mínima
        run: |
          if [ -z "$DB_INSTANCE_NAME_DEV" ]; then
            echo "::error::Falta DB_INSTANCE_NAME_DEV"
            exit 1
          fi
          if [ -z "$DB_NAME_DEV" ]; then
            echo "::error::Falta DB_NAME_DEV"
            exit 1
          fi
          if [ -z "$DB_NAME_STG" ]; then
            echo "::error::Falta DB_NAME_STG"
            exit 1
          fi
          if [ -z "$DB_USER" ]; then
            echo "::error::Falta DB_USER"
            exit 1
          fi

      - name: Guardrails (allowlist)
        run: |
          set -euo pipefail

          if [[ -z "${EXPECTED_GCP_PROJECT_ID:-}" ]]; then
            echo "::error::EXPECTED_GCP_PROJECT_ID vacío (guardrail)"
            exit 1
          fi
          if [[ "$GCP_PROJECT_ID" != "$EXPECTED_GCP_PROJECT_ID" ]]; then
            echo "::error::GCP_PROJECT_ID inesperado: '$GCP_PROJECT_ID' (esperado: '$EXPECTED_GCP_PROJECT_ID')"
            exit 1
          fi

          if [[ -z "${EXPECTED_DB_INSTANCE_NAME_DEV:-}" ]]; then
            echo "::error::EXPECTED_DB_INSTANCE_NAME_DEV vacío (guardrail)"
            exit 1
          fi
          if [[ "$DB_INSTANCE_NAME_DEV" != "$EXPECTED_DB_INSTANCE_NAME_DEV" ]]; then
            echo "::error::DB_INSTANCE_NAME_DEV inesperado: '$DB_INSTANCE_NAME_DEV' (esperado: '$EXPECTED_DB_INSTANCE_NAME_DEV')"
            exit 1
          fi

          instance_lower="$(printf '%s' "$DB_INSTANCE_NAME_DEV" | tr '[:upper:]' '[:lower:]')"
          if [[ "$instance_lower" == *prod* ]]; then
            echo "::error::DB_INSTANCE_NAME_DEV contiene 'prod': '$DB_INSTANCE_NAME_DEV'"
            exit 1
          fi
          if [[ ! "$instance_lower" =~ -dev$ ]]; then
            echo "::error::DB_INSTANCE_NAME_DEV debe terminar en '-dev': '$DB_INSTANCE_NAME_DEV'"
            exit 1
          fi

          db_lower="$(printf '%s' "$DB_NAME_DEV" | tr '[:upper:]' '[:lower:]')"
          # Explicitly block any accidental reset of staging/prod DBs.
          if [[ "$db_lower" == *prod* ]] || [[ "$db_lower" == *stg* ]] || [[ "$db_lower" == *staging* ]]; then
            echo "::error::DB_NAME_DEV no puede contener 'prod', 'stg' ni 'staging': '$DB_NAME_DEV'"
            exit 1
          fi

          if [[ -z "${EXPECTED_DEV_DB_NAME:-}" ]]; then
            echo "::error::EXPECTED_DEV_DB_NAME vacío (guardrail)"
            exit 1
          fi
          if [[ "$DB_NAME_DEV" != "$EXPECTED_DEV_DB_NAME" ]]; then
            echo "::error::DB_NAME_DEV inesperado: '$DB_NAME_DEV' (esperado: '$EXPECTED_DEV_DB_NAME')"
            exit 1
          fi

          stg_lower="$(printf '%s' "$DB_NAME_STG" | tr '[:upper:]' '[:lower:]')"
          if [[ "$stg_lower" == *prod* ]]; then
            echo "::error::DB_NAME_STG no puede contener 'prod': '$DB_NAME_STG'"
            exit 1
          fi
          if [[ -z "${EXPECTED_STG_DB_NAME:-}" ]]; then
            echo "::error::EXPECTED_STG_DB_NAME vacío (guardrail)"
            exit 1
          fi
          if [[ "$DB_NAME_STG" != "$EXPECTED_STG_DB_NAME" ]]; then
            echo "::error::DB_NAME_STG inesperado: '$DB_NAME_STG' (esperado: '$EXPECTED_STG_DB_NAME')"
            exit 1
          fi

          if [[ "$DB_NAME_DEV" == "$DB_NAME_STG" ]]; then
            echo "::error::DB_NAME_DEV y DB_NAME_STG son iguales ('$DB_NAME_DEV'). Abortando para no romper STAGING."
            exit 1
          fi

      - name: Resolve DB password
        run: |
          set -euo pipefail
          db_password="${DB_PASSWORD:-}"
          if [[ -z "$db_password" ]]; then
            db_password="$(gcloud secrets versions access latest \
              --project="$GCP_PROJECT_ID" \
              --secret="$SECRET_DB_PASSWORD_NAME" 2>/dev/null || true)"
          fi
          if [[ -z "$db_password" ]]; then
            echo "::error::No se pudo resolver DB_PASSWORD desde Secret Manager."
            exit 1
          fi
          echo "::add-mask::$db_password"
          echo "DB_PASSWORD=$db_password" >> "$GITHUB_ENV"
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD_DEV }}

      - name: Start Cloud SQL Proxy
        run: |
          set -euo pipefail
          token="$(gcloud auth print-access-token)"
          docker rm -f cloudsql-proxy-reset-dev >/dev/null 2>&1 || true
          docker run -d --name cloudsql-proxy-reset-dev \
            -p "127.0.0.1:${CLOUDSQL_PROXY_PORT}:5432" \
            gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0 \
            --address 0.0.0.0 \
            --port 5432 \
            --token "$token" \
            "${GCP_PROJECT_ID}:${GCP_REGION}:${DB_INSTANCE_NAME_DEV}" >/dev/null

          for i in {1..30}; do
            if PGPASSWORD="$DB_PASSWORD" pg_isready -h 127.0.0.1 -p "$CLOUDSQL_PROXY_PORT" -U "$DB_USER" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "::error::Cloud SQL Proxy no quedó listo."
          exit 1

      - name: Dump STAGING data-only
        run: |
          set -euo pipefail
          PGPASSWORD="$DB_PASSWORD" pg_dump \
            -h 127.0.0.1 \
            -p "$CLOUDSQL_PROXY_PORT" \
            -U "$DB_USER" \
            -d "$DB_NAME_STG" \
            --format=custom \
            --no-owner \
            --no-acl \
            --data-only \
            --exclude-table=schema_migrations \
            --exclude-table=schema_migrations_lock \
            --file=/tmp/staging_data.dump

      - name: Reset DEV DB (drop + create)
        run: |
          set -euo pipefail

          delete_stderr="$(mktemp)"
          if ! gcloud sql databases delete "$DB_NAME_DEV" \
            --project="$GCP_PROJECT_ID" \
            --instance="$DB_INSTANCE_NAME_DEV" \
            --quiet 2>"$delete_stderr"; then
            delete_err_msg="$(tr '\n' ' ' <"$delete_stderr")"
            delete_err_lower="$(printf '%s' "$delete_err_msg" | tr '[:upper:]' '[:lower:]')"
            if echo "$delete_err_lower" | grep -Eq "not found|does not exist"; then
              echo "Base '$DB_NAME_DEV' no existe; continuando con create."
            else
              echo "::error::Fallo al borrar DB '$DB_NAME_DEV': $delete_err_msg"
              rm -f "$delete_stderr"
              exit 1
            fi
          fi
          rm -f "$delete_stderr"

          gcloud sql databases create "$DB_NAME_DEV" \
            --project="$GCP_PROJECT_ID" \
            --instance="$DB_INSTANCE_NAME_DEV"

      - name: Apply migrations on DEV (fresh schema)
        run: |
          set -euo pipefail
          db_password_enc="$(python3 -c "import os, urllib.parse; print(urllib.parse.quote(os.environ['DB_PASSWORD'], safe=''))")"
          docker run --rm --network host \
            -v "$GITHUB_WORKSPACE/migrations_v4:/migrations:ro" \
            migrate/migrate:v4.17.1 \
            -path /migrations \
            -database "postgres://${DB_USER}:${db_password_enc}@127.0.0.1:${CLOUDSQL_PROXY_PORT}/${DB_NAME_DEV}?sslmode=disable" \
            up

      - name: Restore data-only into DEV
        run: |
          set -euo pipefail
          PGPASSWORD="$DB_PASSWORD" psql \
            -h 127.0.0.1 \
            -p "$CLOUDSQL_PROXY_PORT" \
            -U "$DB_USER" \
            -d "$DB_NAME_DEV" \
            -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          DECLARE
            r record;
          BEGIN
            FOR r IN
              SELECT tablename
              FROM pg_tables
              WHERE schemaname = 'public'
                AND tablename NOT IN ('schema_migrations', 'schema_migrations_lock')
            LOOP
              EXECUTE format('TRUNCATE TABLE public.%I RESTART IDENTITY CASCADE', r.tablename);
            END LOOP;
          END $$;
          SQL

          PGPASSWORD="$DB_PASSWORD" psql \
            -h 127.0.0.1 \
            -p "$CLOUDSQL_PROXY_PORT" \
            -U "$DB_USER" \
            -d "$DB_NAME_DEV" \
            -At -c "SELECT tablename FROM pg_tables WHERE schemaname='public'" > /tmp/dev_tables.txt

          PGPASSWORD="$DB_PASSWORD" psql \
            -h 127.0.0.1 \
            -p "$CLOUDSQL_PROXY_PORT" \
            -U "$DB_USER" \
            -d "$DB_NAME_DEV" \
            -At -c "SELECT sequencename FROM pg_sequences WHERE schemaname='public'" > /tmp/dev_sequences.txt

          pg_restore -l /tmp/staging_data.dump > /tmp/staging_data.list
          python3 - <<'PY'
          import pathlib
          tables = {x.strip() for x in pathlib.Path('/tmp/dev_tables.txt').read_text().splitlines() if x.strip()}
          seqs = {x.strip() for x in pathlib.Path('/tmp/dev_sequences.txt').read_text().splitlines() if x.strip()}
          out = []
          for line in pathlib.Path('/tmp/staging_data.list').read_text().splitlines():
            if " TABLE DATA public " in line:
              table = line.split(" TABLE DATA public ", 1)[1].split()[0]
              if table not in tables:
                continue
            if " SEQUENCE SET public " in line:
              seq = line.split(" SEQUENCE SET public ", 1)[1].split()[0]
              if seq not in seqs:
                continue
            out.append(line)
          pathlib.Path('/tmp/staging_data.filtered.list').write_text("\n".join(out) + "\n")
          PY

          PGPASSWORD="$DB_PASSWORD" pg_restore \
            -h 127.0.0.1 \
            -p "$CLOUDSQL_PROXY_PORT" \
            -U "$DB_USER" \
            -d "$DB_NAME_DEV" \
            --no-owner \
            --no-acl \
            --data-only \
            --exit-on-error \
            --use-list=/tmp/staging_data.filtered.list \
            /tmp/staging_data.dump

      - name: Sync sequences after restore
        run: |
          set -euo pipefail
          PGPASSWORD="$DB_PASSWORD" psql \
            -h 127.0.0.1 \
            -p "$CLOUDSQL_PROXY_PORT" \
            -U "$DB_USER" \
            -d "$DB_NAME_DEV" \
            -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          DECLARE
            seq_record RECORD;
            max_id BIGINT;
          BEGIN
            FOR seq_record IN
              SELECT
                seq.relname AS seq_name,
                t.relname AS table_name,
                a.attname AS column_name
              FROM pg_class seq
              JOIN pg_depend d ON d.objid = seq.oid
              JOIN pg_class t ON d.refobjid = t.oid
              JOIN pg_attribute a ON a.attrelid = t.oid AND a.attnum = d.refobjsubid
              WHERE seq.relkind = 'S'
            LOOP
              EXECUTE format('SELECT COALESCE(MAX(%I), 0) FROM %I', seq_record.column_name, seq_record.table_name) INTO max_id;
              EXECUTE format('SELECT setval(%L, %s + 1, false)', seq_record.seq_name, max_id);
            END LOOP;
          END $$;
          SQL

      - name: Hardening post-restore (opcional)
        if: ${{ env.HARDENING_SQL_URI != '' }}
        run: |
          set +e
          gcloud sql import sql "$DB_INSTANCE_NAME_DEV" "$HARDENING_SQL_URI" \
            --project="$GCP_PROJECT_ID" \
            --database="$DB_NAME_DEV" \
            --quiet
          code=$?
          set -e
          if [[ "$code" -ne 0 ]]; then
            echo "::warning::Hardening opcional falló (se continúa): código=$code"
          fi

      - name: Smoke tests (opcional)
        if: ${{ env.SMOKE_TEST_URL != '' }}
        run: |
          curl -fsS "$SMOKE_TEST_URL"

      - name: Stop Cloud SQL Proxy
        if: ${{ always() }}
        run: docker rm -f cloudsql-proxy-reset-dev >/dev/null 2>&1 || true

name: Preview (Cloud Run por PR)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "migrations_v4/**"
      - "scripts/**"
      - "Dockerfile"
      - ".github/workflows/preview.yml"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Número de PR para nombrar el preview (test manual)"
        required: true

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: preview-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID_DEV }}
      ARTIFACT_REGISTRY: ${{ vars.ARTIFACT_REGISTRY }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      CLOUD_RUN_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT_DEV }}
      WIF_PROVIDER: ${{ vars.WIF_PROVIDER_DEV }}
      WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT_DEV }}
      CLOUDSQL_INSTANCE: ${{ vars.CLOUDSQL_INSTANCE_PREVIEW }}
      DB_USER: ${{ vars.DB_USER_PREVIEW }}
      SECRET_DB_PASSWORD_NAME: db-password-preview
      SECRET_X_API_KEY_NAME: x-api-key-dev
      CLOUDSQL_PROXY_PORT: "55432"
      API_VERSION: ${{ vars.API_VERSION }}
      HTTP_SERVER_NAME: ${{ vars.HTTP_SERVER_NAME }}
      HTTP_SERVER_HOST: ${{ vars.HTTP_SERVER_HOST }}
      DB_TYPE: ${{ vars.DB_TYPE }}
      DB_SSL_MODE: ${{ vars.DB_SSL_MODE }}
      DB_PORT: ${{ vars.DB_PORT }}
      MIGRATIONS_DIR: ${{ vars.MIGRATIONS_DIR }}
      WORDS_SUGGESTER_LIMIT: ${{ vars.WORDS_SUGGESTER_LIMIT }}
      WORDS_SUGGESTER_THRESHOLD: ${{ vars.WORDS_SUGGESTER_THRESHOLD }}
      REPORT_SCHEMA: ${{ vars.REPORT_SCHEMA }}
      SERVICE_ENV_NAME: ${{ vars.SERVICE_NAME_ENV }}
      SERVICE_ENV_MAX_RETRIES: ${{ vars.SERVICE_MAX_RETRIES_ENV }}
    steps:
      - name: Resolve PR context
        run: |
          set -euo pipefail
          PR_NUM="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          if [[ ! "$PR_NUM" =~ ^[0-9]+$ ]]; then
            echo "ERROR: PR number inválido: '$PR_NUM'"; exit 1
          fi
          echo "PR_NUM=$PR_NUM" >> "$GITHUB_ENV"
          echo "SERVICE_NAME=ponti-backend-pr-${PR_NUM}" >> "$GITHUB_ENV"
          echo "DB_NAME=ponti_preview_pr_${PR_NUM}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Resolve deploy SHA
        run: |
          set -euo pipefail
          deploy_sha="$(git rev-parse HEAD)"
          echo "DEPLOY_SHA=$deploy_sha" >> "$GITHUB_ENV"
          echo "DEPLOY_SHORT_SHA=${deploy_sha::12}" >> "$GITHUB_ENV"

      - name: Auth GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Build metadata
        run: |
          set -euo pipefail
          echo "SERVICE_GIT_SHA=${DEPLOY_SHA}" >> "$GITHUB_ENV"
          echo "SERVICE_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          echo "RELEASE_SERVICE_VERSION=pr-${PR_NUM}-${DEPLOY_SHORT_SHA}" >> "$GITHUB_ENV"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build y push imagen
        env:
          GO_MODULES_TOKEN: ${{ secrets.CORE_REPO_READ_TOKEN }}
        run: |
          set -euo pipefail
          image_uri="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY}/${IMAGE_NAME}:${DEPLOY_SHA}"
          docker build --secret id=go_modules_token,env=GO_MODULES_TOKEN -t "$image_uri" .
          docker push "$image_uri"
          echo "IMAGE_URI=$image_uri" >> "$GITHUB_ENV"

      - name: Start Cloud SQL Proxy
        run: |
          token="$(gcloud auth print-access-token)"
          docker rm -f cloudsql-proxy-preview >/dev/null 2>&1 || true
          docker run -d --name cloudsql-proxy-preview \
            -p "127.0.0.1:${CLOUDSQL_PROXY_PORT}:5432" \
            gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0 \
            --address 0.0.0.0 --port 5432 --token "$token" \
            "$CLOUDSQL_INSTANCE" >/dev/null
          for i in {1..30}; do
            if PGPASSWORD="$DB_PASSWORD" pg_isready -h 127.0.0.1 -p "$CLOUDSQL_PROXY_PORT" -U "$DB_USER" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: cloud sql proxy no quedó listo"; exit 1
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD_PREVIEW }}

      - name: Create preview database (idempotente)
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD_PREVIEW }}
        run: |
          set -euo pipefail
          if [[ ! "$DB_NAME" =~ ^ponti_preview_pr_[0-9]+$ ]]; then
            echo "ERROR: DB_NAME no cumple el patrón de preview: $DB_NAME"; exit 1
          fi
          exists="$(psql "host=127.0.0.1 port=${CLOUDSQL_PROXY_PORT} user=${DB_USER} dbname=postgres" -tAc "SELECT 1 FROM pg_database WHERE datname='${DB_NAME}'")"
          if [[ "$exists" != "1" ]]; then
            psql "host=127.0.0.1 port=${CLOUDSQL_PROXY_PORT} user=${DB_USER} dbname=postgres" -c "CREATE DATABASE \"${DB_NAME}\""
            echo "Base creada: ${DB_NAME}"
          else
            echo "Base ya existe: ${DB_NAME}"
          fi

      - name: Deploy a Cloud Run (PREVIEW)
        run: |
          set -euo pipefail
          DB_HOST="/cloudsql/${CLOUDSQL_INSTANCE}"
          ENV_VARS="GO_ENVIRONMENT=cloudrun,DEPLOY_ENV=preview,DEPLOY_PLATFORM=gcp,SERVICE_NAME=${SERVICE_ENV_NAME},SERVICE_VERSION=${RELEASE_SERVICE_VERSION},SERVICE_GIT_SHA=${SERVICE_GIT_SHA},SERVICE_BUILD_TIME=${SERVICE_BUILD_TIME},SERVICE_MAX_RETRIES=${SERVICE_ENV_MAX_RETRIES},API_VERSION=${API_VERSION},HTTP_SERVER_NAME=${HTTP_SERVER_NAME},HTTP_SERVER_HOST=${HTTP_SERVER_HOST},DB_TYPE=${DB_TYPE},DB_USER=${DB_USER},DB_HOST=${DB_HOST},DB_NAME=${DB_NAME},DB_SSL_MODE=${DB_SSL_MODE},DB_PORT=${DB_PORT},MIGRATIONS_DIR=${MIGRATIONS_DIR},WORDS_SUGGESTER_LIMIT=${WORDS_SUGGESTER_LIMIT},WORDS_SUGGESTER_THRESHOLD=${WORDS_SUGGESTER_THRESHOLD},REPORT_SCHEMA=${REPORT_SCHEMA},RUN_MIGRATIONS_ON_STARTUP=true,IDENTITY_PROJECT_ID=${GCP_PROJECT_ID},AUTH_ENABLED=false"
          gcloud run deploy "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="$IMAGE_URI" \
            --service-account="$CLOUD_RUN_SERVICE_ACCOUNT" \
            --add-cloudsql-instances="$CLOUDSQL_INSTANCE" \
            --set-env-vars="${ENV_VARS}" \
            --set-secrets="DB_PASSWORD=${SECRET_DB_PASSWORD_NAME}:latest,X_API_KEY=${SECRET_X_API_KEY_NAME}:latest" \
            --max-instances=2 \
            --labels="managed-by=preview,pr=${PR_NUM}" \
            --allow-unauthenticated

      - name: Resolve service URL
        run: |
          service_url="$(gcloud run services describe "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" --region="$GCP_REGION" \
            --format='value(status.url)')"
          if [[ -z "$service_url" ]]; then echo "ERROR: sin URL"; exit 1; fi
          echo "SERVICE_URL=$service_url" >> "$GITHUB_ENV"

      - name: Smoke healthz
        run: |
          set -euo pipefail
          for i in {1..15}; do
            code="$(curl -s -o /dev/null -w '%{http_code}' "${SERVICE_URL}/api/v1/healthz" || true)"
            if [[ "$code" == "200" ]]; then echo "healthz OK"; exit 0; fi
            sleep 3
          done
          echo "ERROR: healthz no respondió 200 (último: ${code:-?})"; exit 1

      - name: Comentario en el PR
        if: ${{ github.event.pull_request.number }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          body="$(printf '<!--preview-->\n🚀 **Preview desplegado** para PR #%s\n\n- URL: %s\n- Servicio: \`%s\`\n- Base: \`%s\`\n- Versión: \`%s\`\n\n_Se destruye automáticamente al cerrar el PR._' "$PR_NUM" "$SERVICE_URL" "$SERVICE_NAME" "$DB_NAME" "$RELEASE_SERVICE_VERSION")"
          gh pr comment "$PR_NUM" --edit-last --body "$body" 2>/dev/null || gh pr comment "$PR_NUM" --body "$body"

      - name: Stop Cloud SQL Proxy
        if: ${{ always() }}
        run: docker rm -f cloudsql-proxy-preview >/dev/null 2>&1 || true

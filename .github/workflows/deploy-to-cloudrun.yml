name: Build, Push to Artifact Registry, and Deploy to Cloud Run

on:
  push:
    branches:
      - develop

env:
  GCP_PROJECT_ID: soalen-app
  GCP_REGION: us-central1
  REPOSITORY_NAME: ponti-backend
  SERVICE_NAME: ponti-backend-api
  IMAGE_NAME: ponti-backend-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configurar credenciales de Google Cloud
        run: |
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > key.json

      - name: Autenticar Docker para Artifact Registry
        run: |
          cat key.json | docker login -u _json_key --password-stdin https://${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Autenticar en gcloud
        run: |
          gcloud auth activate-service-account --key-file=key.json

      - name: Build, tag, and push image to Artifact Registry
        id: build-image
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}

          FULL_IMAGE_NAME=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY_NAME }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG

          docker build -t $FULL_IMAGE_NAME .
          docker push $FULL_IMAGE_NAME
          echo "image=$FULL_IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Download Cloud SQL Auth Proxy
        run: |
          curl -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.10.1/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Start Cloud SQL Auth Proxy
        run: |
          mkdir -p ./cloudsql
          ./cloud-sql-proxy ${{ secrets.INSTANCE_CONNECTION_NAME }} \
            --unix-socket=./cloudsql \
            --credentials-file=key.json &
          sleep 5

      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/

      - name: Run database migrations
        run: |
          DB_USER=${{ secrets.DB_USER }}
          DB_NAME=${{ secrets.DB_NAME }}
          INSTANCE=${{ secrets.INSTANCE_CONNECTION_NAME }}
          SOCKET_PATH=$(pwd)/cloudsql/$INSTANCE

          echo "SOCKET_PATH: $SOCKET_PATH"

          ENCODED_SOCKET_PATH=$(echo "$SOCKET_PATH" | sed 's/\//%2F/g')
          echo "ENCODED_SOCKET_PATH: $ENCODED_SOCKET_PATH"

          migrate -path ./projects/ponti-api/migrations \
              -database "postgres://$DB_USER@unix($ENCODED_SOCKET_PATH)/$DB_NAME?sslmode=disable" up

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ steps.build-image.outputs.image }} \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --allow-unauthenticated \
            --quiet

      - name: Clean up credentials
        if: always()
        run: |
          rm -f key.json

name: Build, Push to Artifact Registry, and Deploy to Cloud Run

on:
  push:
    branches:
      - develop

env:
  GCP_PROJECT_ID: ponti-474821
  GCP_REGION: us-central1   
  REPOSITORY_NAME: ponti-api-registry
  SERVICE_NAME: ponti-api
  IMAGE_NAME: ponti-api
  WORKLOAD_IDENTITY_PROVIDER: 'projects/1056876389857/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
  SERVICE_ACCOUNT: 'github-actions@ponti-474821.iam.gserviceaccount.com'

# Permisos necesarios para OIDC
permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Autenticación usando Workload Identity Federation (sin keys JSON)
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build, tag, and push image to Artifact Registry
        id: build-image
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}
          
          FULL_IMAGE_NAME=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY_NAME }}/${{ env.IMAGE_NAME }}:$IMAGE_TAG
          
          echo "🏗️ Building image: $FULL_IMAGE_NAME"
          docker build -t $FULL_IMAGE_NAME .
          
          echo "📤 Pushing image to Artifact Registry..."
          docker push $FULL_IMAGE_NAME
          
          echo "image=$FULL_IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "✅ Image pushed successfully"

      - name: Run Database Migrations
        run: |
          echo "🔄 Running database migrations..."
          
          # Instalar Cloud SQL Proxy
          wget https://dl.google.com/cloudsql/cloud_sql_proxy.linux.amd64 -O cloud_sql_proxy
          chmod +x cloud_sql_proxy
          
          # Iniciar Cloud SQL Proxy en background
          ./cloud_sql_proxy -instances=${{ secrets.INSTANCE_CONNECTION_NAME }}=tcp:5432 &
          PROXY_PID=$!
          
          # Esperar a que el proxy esté listo
          sleep 5
          
          # Instalar golang-migrate
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.1/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/migrate
          
          # Ejecutar migraciones
          cd projects/ponti-api
          migrate -path migrations \
            -database "postgres://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@127.0.0.1:5432/${{ secrets.DB_NAME }}?sslmode=disable" \
            up
          
          # Detener Cloud SQL Proxy
          kill $PROXY_PID
          
          echo "✅ Migrations completed"

      - name: Deploy to Cloud Run
        run: |
          echo "🚀 Deploying to Cloud Run..."
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ steps.build-image.outputs.image }} \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --max-instances=10 \
            --timeout=300s \
            --set-env-vars="DEPLOY_PLATFORM=gcp,DEPLOY_ENV=prod,DB_HOST=34.133.49.164,DB_PORT=5432,DB_NAME=${{ secrets.DB_NAME }},DB_USER=${{ secrets.DB_USER }},DB_PASSWORD=${{ secrets.DB_PASSWORD }},DB_SSL_MODE=require" \
            --quiet
          
          echo "✅ Deployment completed"

      - name: Get Service URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "🌐 Service URL: $SERVICE_URL"
          echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_ENV

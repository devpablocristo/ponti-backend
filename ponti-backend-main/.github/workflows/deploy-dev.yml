name: Deploy DEV (Cloud Run)

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Rama o ref a desplegar (default: develop)'
        required: false
        default: 'develop'

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID_DEV }}
      ARTIFACT_REGISTRY: ${{ vars.ARTIFACT_REGISTRY }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      SERVICE_NAME: ${{ vars.SERVICE_NAME_DEV }}
      CLOUD_RUN_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT_DEV }}
      WIF_PROVIDER: ${{ vars.WIF_PROVIDER_DEV }}
      WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT_DEV }}
      SECRET_DB_PASSWORD_NAME_DEV: db-password-dev
      SECRET_X_API_KEY_NAME_DEV: x-api-key-dev
      CLOUDSQL_PROXY_PORT: "55432"
      REQUIRE_AUTH_SMOKE: "0"
      CLOUDSQL_INSTANCE: ${{ vars.CLOUDSQL_INSTANCE_DEV }}
      DB_NAME: ${{ vars.DB_NAME_DEV }}
      DB_USER: ${{ vars.DB_USER_DEV }}
      API_VERSION: ${{ vars.API_VERSION }}
      HTTP_SERVER_NAME: ${{ vars.HTTP_SERVER_NAME }}
      HTTP_SERVER_HOST: ${{ vars.HTTP_SERVER_HOST }}
      DB_TYPE: ${{ vars.DB_TYPE }}
      DB_SSL_MODE: ${{ vars.DB_SSL_MODE }}
      DB_PORT: ${{ vars.DB_PORT }}
      MIGRATIONS_DIR: ${{ vars.MIGRATIONS_DIR }}
      WORDS_SUGGESTER_LIMIT: ${{ vars.WORDS_SUGGESTER_LIMIT }}
      WORDS_SUGGESTER_THRESHOLD: ${{ vars.WORDS_SUGGESTER_THRESHOLD }}
      REPORT_SCHEMA: ${{ vars.REPORT_SCHEMA }}
      SERVICE_ENV_NAME: ${{ vars.SERVICE_NAME_ENV }}
      SERVICE_ENV_VERSION: ${{ vars.SERVICE_VERSION_ENV }}
      SERVICE_ENV_MAX_RETRIES: ${{ vars.SERVICE_MAX_RETRIES_ENV }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build y push imagen
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          image_uri="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker build -t "$image_uri" .
          docker push "$image_uri"
          echo "IMAGE_URI=$image_uri" >> "$GITHUB_ENV"

      - name: Deploy a Cloud Run (DEV)
        run: |
          DB_HOST="/cloudsql/${CLOUDSQL_INSTANCE}"
          ENV_VARS="GO_ENVIRONMENT=cloudrun,DEPLOY_ENV=dev,DEPLOY_PLATFORM=gcp,SERVICE_NAME=${SERVICE_ENV_NAME},SERVICE_VERSION=${SERVICE_ENV_VERSION},SERVICE_MAX_RETRIES=${SERVICE_ENV_MAX_RETRIES},API_VERSION=${API_VERSION},HTTP_SERVER_NAME=${HTTP_SERVER_NAME},HTTP_SERVER_HOST=${HTTP_SERVER_HOST},DB_TYPE=${DB_TYPE},DB_USER=${DB_USER},DB_HOST=${DB_HOST},DB_NAME=${DB_NAME},DB_SSL_MODE=${DB_SSL_MODE},DB_PORT=${DB_PORT},MIGRATIONS_DIR=${MIGRATIONS_DIR},WORDS_SUGGESTER_LIMIT=${WORDS_SUGGESTER_LIMIT},WORDS_SUGGESTER_THRESHOLD=${WORDS_SUGGESTER_THRESHOLD},REPORT_SCHEMA=${REPORT_SCHEMA},IDENTITY_PROJECT_ID=${GCP_PROJECT_ID}"
          gcloud run deploy "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="$IMAGE_URI" \
            --service-account="$CLOUD_RUN_SERVICE_ACCOUNT" \
            --add-cloudsql-instances="$CLOUDSQL_INSTANCE" \
            --set-env-vars="${ENV_VARS}" \
            --set-secrets="DB_PASSWORD=${SECRET_DB_PASSWORD_NAME_DEV}:latest,X_API_KEY=${SECRET_X_API_KEY_NAME_DEV}:latest" \
            --allow-unauthenticated

      - name: Resolve service URL (DEV)
        run: |
          service_url="$(gcloud run services describe "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='value(status.url)')"
          if [[ -z "$service_url" ]]; then
            echo "ERROR: no se pudo resolver status.url del servicio DEV."
            exit 1
          fi
          echo "SERVICE_URL=$service_url" >> "$GITHUB_ENV"

      - name: "Guardrail: traffic/latest + detagged service URLs (DEV)"
        run: |
          service_json="$(gcloud run services describe "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='json')"
          SERVICE_JSON="$service_json" python3 - <<'PY'
          import json, os, sys
          svc = json.loads(os.environ["SERVICE_JSON"])
          traffic = svc.get("status", {}).get("traffic", [])
          ok_latest = any(t.get("latestRevision") is True and int(t.get("percent", 0)) == 100 for t in traffic)
          if not ok_latest:
              print("ERROR: guardrail falló: tráfico no está 100% en latestRevision.")
              sys.exit(1)
          envs = svc.get("spec", {}).get("template", {}).get("spec", {}).get("containers", [{}])[0].get("env", [])
          bad = []
          watched = {"BASE_MANAGER_API", "AI_SERVICE_URL"}
          for e in envs:
              name = e.get("name", "")
              value = e.get("value", "")
              if not value:
                  continue
              if name in watched or name.endswith("_URL"):
                  if "---" in value:
                      bad.append(f"{name}={value}")
          if bad:
              print("ERROR: guardrail falló: URLs internas taggeadas detectadas:")
              for item in bad:
                  print(f" - {item}")
              sys.exit(1)
          print("Guardrail OK: latestRevision=100% y sin URLs taggeadas.")
          PY

      - name: Resolve DB password for schema checks (DEV)
        run: |
          db_password="${SMOKE_DB_PASSWORD:-}"
          if [[ -z "$db_password" ]]; then
            db_password="$(gcloud secrets versions access latest \
              --project="$GCP_PROJECT_ID" \
              --secret="$SECRET_DB_PASSWORD_NAME_DEV" 2>/dev/null || true)"
          fi
          if [[ -z "$db_password" ]]; then
            echo "ERROR: no se pudo resolver DB password para schema checks en DEV."
            exit 1
          fi
          echo "::add-mask::$db_password"
          echo "SMOKE_DB_PASSWORD=$db_password" >> "$GITHUB_ENV"
        env:
          SMOKE_DB_PASSWORD: ${{ secrets.DB_PASSWORD_DEV }}

      - name: Start Cloud SQL Proxy for schema checks (DEV)
        run: |
          token="$(gcloud auth print-access-token)"
          docker rm -f cloudsql-proxy-deploy-dev >/dev/null 2>&1 || true
          instance_connection="$CLOUDSQL_INSTANCE"
          if [[ "$instance_connection" != *:*:* ]]; then
            instance_connection="${GCP_PROJECT_ID}:${GCP_REGION}:${CLOUDSQL_INSTANCE}"
          fi
          docker run -d --name cloudsql-proxy-deploy-dev \
            -p "127.0.0.1:${CLOUDSQL_PROXY_PORT}:5432" \
            gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0 \
            --address 0.0.0.0 \
            --port 5432 \
            --token "$token" \
            "$instance_connection" >/dev/null
          for i in {1..30}; do
            if PGPASSWORD="$SMOKE_DB_PASSWORD" pg_isready -h 127.0.0.1 -p "$CLOUDSQL_PROXY_PORT" -U "$DB_USER" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: cloud sql proxy no quedó listo en DEV"
          exit 1

      - name: Schema guardrails (DEV)
        run: |
          chmod +x scripts/check_schema_guardrails.sh
          DB_HOST=127.0.0.1 \
          DB_PORT="$CLOUDSQL_PROXY_PORT" \
          DB_USER="$DB_USER" \
          DB_NAME="$DB_NAME" \
          DB_PASSWORD="$SMOKE_DB_PASSWORD" \
          MIGRATIONS_DIR="migrations_v4" \
          scripts/check_schema_guardrails.sh

      - name: Resolve X-API-Key for smoke (DEV)
        run: |
          x_api_key="${SMOKE_X_API_KEY:-}"
          if [[ -z "$x_api_key" ]]; then
            x_api_key="$(gcloud secrets versions access latest \
              --project="$GCP_PROJECT_ID" \
              --secret="$SECRET_X_API_KEY_NAME_DEV" 2>/dev/null || true)"
          fi
          if [[ -z "$x_api_key" ]]; then
            echo "ERROR: no se pudo resolver X-API-Key (GitHub secret o Secret Manager) en DEV."
            exit 1
          fi
          echo "::add-mask::$x_api_key"
          echo "SMOKE_X_API_KEY=$x_api_key" >> "$GITHUB_ENV"
        env:
          SMOKE_X_API_KEY: ${{ secrets.X_API_KEY_DEV }}

      - name: Resolve auth token for functional smoke (DEV)
        run: |
          token="${SMOKE_AUTH_BEARER_TOKEN:-}"
          if [[ -z "$token" ]]; then
            echo "WARN: SMOKE_AUTH_BEARER_TOKEN no configurado; se ejecutará smoke no autenticado."
          else
            echo "::add-mask::$token"
            echo "AUTH_BEARER_TOKEN=$token" >> "$GITHUB_ENV"
          fi
        env:
          SMOKE_AUTH_BEARER_TOKEN: ${{ secrets.SMOKE_AUTH_BEARER_TOKEN_DEV }}

      - name: Smoke release checks (DEV)
        run: |
          bash ./scripts/smoke_release.sh "$SERVICE_URL"
        env:
          X_API_KEY: ${{ env.SMOKE_X_API_KEY }}
          AUTH_BEARER_TOKEN: ${{ env.AUTH_BEARER_TOKEN }}
          REQUIRE_AUTH_SMOKE: ${{ env.REQUIRE_AUTH_SMOKE }}

      - name: Stop Cloud SQL Proxy (DEV)
        if: ${{ always() }}
        run: docker rm -f cloudsql-proxy-deploy-dev >/dev/null 2>&1 || true

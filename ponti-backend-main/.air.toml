root = "."
tmp_dir = "tmp"

[build]
  cmd = "CGO_ENABLED=1 go build -buildvcs=false -o ./tmp/main ./cmd/api/"
  bin = "./tmp/main"
  delay = 1000
  exclude_dir = ["tmp", "bin", "vendor", "node_modules", "migrations_v4", "scripts", ".git", ".cursor"]
  exclude_regex = ["_test\\.go$"]
  exclude_unchanged = true
  follow_symlink = false
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "3s"
  send_interrupt = true
  stop_on_error = true

[log]
  time = false
  main_only = true

[misc]
  clean_on_exit = true

services:
  euxcel-api:
    build:
      context: ../../
      dockerfile: ./projects/euxcel-api/Dockerfile.dev
    image: "euxcel-api:${APP_VERSION}"
    env_file:
      - .env
    ports:
      - "${HTTP_SERVER_PORT}:${HTTP_SERVER_PORT}"
      - "${DELVE_PORT}:${DELVE_PORT}"
      - "${WS_SERVER_PORT}:${WS_SERVER_PORT}"
    volumes:
      - type: bind
        source: ../../
        target: /app
      - /var/run/docker.sock:/var/run/docker.sock
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    environment:
      GO111MODULE: "on"
      BUILDING_FILES: "/app/cmd/api/main.go"
      APP_NAME: "euxcel-api"
    depends_on:
      - postgres
      - redis
    networks:
      - app-network
    restart: on-failure
    command: ["tail", "-f", "/dev/null"]
    tty: true
    stdin_open: true
    healthcheck:
      test: ["CMD-SHELL", "pgrep tail || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  postgres:
    image: postgres:16.3
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres-storage:/storage
      - ./infra/postgres-init:/docker-entrypoint-initdb.d
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:8.12
    ports:
      - "${PGADMIN_PORT}:${PGADMIN_TARGET_PORT}"
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD}"
    logging:
      driver: "json-file"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - app-network
    restart: unless-stopped

  migrations:
    image: gomicro/goose:3.7.0
    volumes:
      - ./infra/migrations:/app/migrations
    environment:
      PGHOST: "${POSTGRES_HOST}"
      PGUSER: "${POSTGRES_USER}"
      PGPASSWORD: "${POSTGRES_PASSWORD}"
      PGDATABASE: "${POSTGRES_DB}"
      PGSSLMODE: "disable"
    command: [
      "goose",
      "-dir", "/app/migrations",
      "postgres",
      "host=${POSTGRES_HOST} user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB} sslmode=disable",
      "up"
    ]
    depends_on:
      - postgres
    networks:
      - app-network
    restart: "no"

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "${SMTP_PORT}:${SMTP_PORT}"
      - "${MH_WEB_UI_PORT}:${MH_WEB_UI_PORT}"
    networks:
      - app-network
    restart: unless-stopped
    volumes:
      - mailhog_data:/var/lib/mailhog

  redis:
    image: redis:7.0
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      - app-network
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  mailhog_data:
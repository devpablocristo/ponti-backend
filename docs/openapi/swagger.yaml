basePath: /api/v1
definitions:
  github_com_devpablocristo_ponti-backend_internal_data-integrity_handler_dto.IntegrityCheckDTO:
    properties:
      check_type:
        type: string
      control_number:
        type: integer
      control_rule:
        type: string
      data_to_verify:
        type: string
      description:
        type: string
      difference_a:
        type: string
      difference_b:
        type: string
      recalc_a_calculation:
        type: string
      recalc_a_meaning:
        type: string
      recalc_a_source:
        type: string
      recalc_a_value:
        type: string
      recalc_b_calculation:
        type: string
      recalc_b_meaning:
        type: string
      recalc_b_source:
        type: string
      recalc_b_value:
        type: string
      recommendation:
        type: string
      severity:
        type: string
      status:
        type: string
      system_calculation:
        type: string
      system_meaning:
        type: string
      system_source:
        type: string
      system_value:
        type: string
      tolerance:
        type: string
    type: object
  github_com_devpablocristo_ponti-backend_internal_data-integrity_handler_dto.IntegrityReportResponse:
    properties:
      checks:
        items:
          $ref: '#/definitions/github_com_devpablocristo_ponti-backend_internal_data-integrity_handler_dto.IntegrityCheckDTO'
        type: array
    type: object
  internal_admin.MeContext:
    properties:
      current_tenant_id:
        type: string
      tenants:
        items:
          $ref: '#/definitions/internal_admin.MeTenant'
        type: array
      user:
        $ref: '#/definitions/internal_admin.MeUser'
    type: object
  internal_admin.MeTenant:
    properties:
      id:
        type: string
      is_current:
        type: boolean
      name:
        type: string
      permissions:
        items:
          type: string
        type: array
      role:
        type: string
    type: object
  internal_admin.MeUser:
    properties:
      email:
        type: string
      id:
        type: string
      idp_email:
        type: string
      idp_sub:
        type: string
    type: object
info:
  contact:
    name: Ponti Backend
    url: https://github.com/devpablocristo/ponti-backend
  description: API de negocio para Ponti. ~50 endpoints REST cubiertos por handlers
    en internal/<module>/. Errores en inglés (ver docs/ERROR_CATALOG.md). Multi-tenant
    por header. Auth Bearer JWT (Firebase IDP).
  license:
    name: Propietario
  termsOfService: https://github.com/devpablocristo/ponti-backend
  title: Ponti Backend API
  version: "1.0"
paths:
  /data-integrity/costs-check:
    get:
      consumes:
      - application/json
      description: Valida que el valor de costos directos totales sea consistente
        en todos los módulos
      parameters:
      - description: Project ID
        in: query
        name: project_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_devpablocristo_ponti-backend_internal_data-integrity_handler_dto.IntegrityReportResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Validar coherencia de costos directos
      tags:
      - data-integrity
  /me/context:
    get:
      description: Endpoint de arranque del frontend. Lee el JWT del header Authorization,
        identifica al usuario local, y devuelve los tenants donde tiene membership
        con sus roles + permisos. Si X-Tenant-ID está presente, marca ese tenant como
        `is_current=true`.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_admin.MeContext'
        "401":
          description: authentication context required
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: local user not found / tenant context required
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: internal
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 'Bootstrap del FE: usuario + tenants + roles + permisos'
      tags:
      - admin
securityDefinitions:
  BearerAuth:
    description: '"Bearer <JWT>" (Firebase Identity Platform).'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"

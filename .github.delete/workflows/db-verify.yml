name: DB Verify

on:
  workflow_dispatch: {}
  pull_request:
    branches:
      - develop

permissions:
  contents: read

jobs:
  db-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear .env para CI
        run: |
          cat > .env << 'EOF'
          DB_USER=admin
          DB_PASSWORD=admin
          DB_HOST=127.0.0.1
          DB_NAME=new_ponti_db_dev
          DB_SSL_MODE=disable
          DB_PORT=5432
          MIGRATIONS_DIR=file://migrations_v4
          EOF

      - name: Levantar PostgreSQL
        run: docker compose up -d ponti-db

      - name: Esperar DB disponible
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T ponti-db pg_isready -U admin -d postgres -p 5432; then
              exit 0
            fi
            sleep 1
          done
          echo "DB no respondió a tiempo"
          exit 1

      - name: DB Verify
        run: make db-verify

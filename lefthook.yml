# Lefthook config — pre-commit hooks para ponti-backend.
#
# Instalación (una vez por dev):
#   brew install lefthook       # macOS
#   sudo apt install lefthook   # Debian/Ubuntu
#   # Luego en el repo:
#   lefthook install
#
# Para correr a mano: `lefthook run pre-commit`.
# Para bypass en emergencia: `git commit --no-verify` (NO usar de rutina).

pre-commit:
  parallel: true
  commands:
    gofmt:
      glob: "*.go"
      run: |
        unformatted=$(gofmt -l {staged_files})
        if [ -n "$unformatted" ]; then
          echo "gofmt needs to be run on:"
          echo "$unformatted"
          exit 1
        fi

    go-vet:
      glob: "*.go"
      # vet es package-level, no per-file. Solo lo corremos si hay .go staged.
      run: go vet ./...

    golangci-lint:
      glob: "*.go"
      # --fast skip de linters caros para no romper el flujo; CI corre el set completo.
      run: golangci-lint run --fast --new-from-rev=HEAD

pre-push:
  commands:
    tests:
      run: go test ./... -count=1 -short
